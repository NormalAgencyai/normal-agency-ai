<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency | نورمال</title>
    <style>
        /* تحسينات التصميم العام */
        body { background-color: #f4f7fb; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 0 80px 0; transition: 0.3s; }
        
        /* الشريط العلوي للغة */
        .top-bar { background: #007bff; padding: 10px 20px; display: flex; justify-content: flex-start; }
        .lang-btn { background: white; color: #007bff; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .logo { width: 200px; margin: 20px auto; }
        
        .hero-title { font-size: 32px; font-weight: bold; color: #007bff; }
        .hero-subtitle { font-size: 18px; margin-bottom: 40px; color: #666; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { padding: 40px 20px; border-radius: 20px; background: white; cursor: pointer; transition: 0.3s; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-10px); border: 2px solid #007bff; }
        
        .assistant-box { background: white; border-radius: 20px; padding: 40px; max-width: 600px; margin: 40px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        /* الشريط السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #eee; z-index: 2000; }
        .bottom-nav a { text-decoration: none; color: #007bff; font-weight: bold; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; }
        .form-box { max-width: 500px; margin: 100px auto; background: white; padding: 30px; border-radius: 20px; }
        input, textarea { width: 90%; padding: 15px; margin: 10px auto; border-radius: 10px; border: 1px solid #ddd; display: block; }
        button { background: #007bff; color: white; border: none; padding: 15px 40px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- الشريط العلوي للغة -->
    <div class="top-bar">
        <button class="lang-btn" onclick="toggleLanguage()">🌐 EN / AR</button>
    </div>

    <div class="container">
        <img src="logo.png.png" alt="شعار نورمال" class="logo">
        <div class="hero-title">✦✦ نورمال للخدمات الإلكترونية المتكاملة ✦✦</div>
        <div class="hero-subtitle">من الفكرة إلى التنفيذ │ حلول رقمية وإبداعية متكاملة</div>

        <div id="services-section">
            <h1>خدماتنا</h1>
            <div class="grid">
                <div class="card" onclick="showSubServices('نورمال ديجيتال', ['تصميم المواقع', 'تطوير المتاجر'])">نورمال ديجيتال</div>
                <div class="card" onclick="showSubServices('نورمال ستوديو', ['تصوير', 'مونتاج'])">نورمال ستوديو</div>
                <div class="card" onclick="showSubServices('نورمال آرت', ['هوية بصرية', 'تصميم شعارات'])">نورمال آرت</div>
                <div class="card" onclick="showSubServices('نورمال برينت', ['طباعة كروت', 'لوحات'])">نورمال برينت</div>
            </div>
        </div>

        <div class="assistant-box">
            <h3>المساعد الذكي "نورمال"</h3>
            <form action="https://formspree.io/f/xykvqjek" method="POST">
                <input type="email" name="email" placeholder="بريدك للتواصل" required>
                <textarea name="message" placeholder="اكتب رسالتك هنا..." required></textarea>
                <button type="submit">إرسال للمساعد</button>
            </form>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" onclick="window.scrollTo(0, 0);">الرئيسية</a>
        <a href="#services-section">خدماتنا</a>
        <a href="https://wa.me/966595262869" target="_blank">تواصل معنا</a>
    </div>

    <div id="modal" class="modal">
        <div class="form-box">
            <button onclick="document.getElementById('modal').style.display='none'">إغلاق ✖</button>
            <h3 id="modalTitle"></h3>
            <ul id="subList"></ul>
            <form action="https://formspree.io/f/xykvqjek" method="POST">
                <input type="text" name="service" id="hiddenService" placeholder="الخدمة المطلوبة" required readonly>
                <input type="email" name="email" placeholder="البريد الإلكتروني" required>
                <textarea name="message" id="messageArea" placeholder="تفاصيل الطلب..."></textarea>
                <button type="submit">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <script>
        const translations = {
            "خدماتنا": "Our Services", "الرئيسية": "Home", "تواصل معنا": "Contact Us",
            "المساعد الذكي \"نورمال\"": "Normal AI Assistant", "إرسال للمساعد": "Send to Assistant",
            "الخدمة المطلوبة": "Required Service", "البريد الإلكتروني": "Email",
            "تفاصيل الطلب...": "Request Details...", "إرسال الطلب": "Send Request",
            "نورمال للخدمات الإلكترونية المتكاملة": "Normal Integrated Electronic Services",
            "من الفكرة إلى التنفيذ │ حلول رقمية وإبداعية متكاملة": "From Idea to Execution | Integrated Digital & Creative Solutions"
        };
        let isArabic = true;

        function toggleLanguage() {
            isArabic = !isArabic;
            document.body.style.direction = isArabic ? 'rtl' : 'ltr';
            document.querySelectorAll('h1, h3, a, button, input, textarea, .card, .hero-title, .hero-subtitle').forEach(el => {
                const text = el.innerText || el.placeholder;
                if (translations[text]) el.innerText ? el.innerText = translations[text] : el.placeholder = translations[text];
                else if (!isArabic) { for(let k in translations) if(translations[k] === text) el.innerText ? el.innerText = k : el.placeholder = k; }
            });
        }
        function showSubServices(title, items) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('subList').innerHTML = items.map(item => `<li onclick="selectSub('${item}')">✅ ${item}</li>`).join('');
            document.getElementById('modal').style.display = 'block';
        }
        function selectSub(item) {
            document.getElementById('hiddenService').value = item;
            alert("تم اختيار الخدمة: " + item);
        }
    </script>
</body>
</html>
