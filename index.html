<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Agency | الخدمات</title>
    <style>
        :root { --primary: #1e3a8a; --bg: #ffffff; --text: #1f2937; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        
        /* القسم الخاص باللوغو */
        .logo-container { margin: 30px auto; }
        .logo-container img { width: 150px; height: auto; }

        /* الشبكة التفاعلية */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 900px; margin: 40px auto; }
        .card { 
            background: #ffffff; padding: 30px; border-radius: 20px; border: 1px solid #e5e7eb; 
            cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        .card:hover { border-color: var(--primary); box-shadow: 0 10px 25px rgba(30, 58, 138, 0.1); transform: translateY(-5px); }
        .card h3 { color: var(--primary); margin-top: 0; }
        .card ul { list-style: none; padding: 0; text-align: right; }
        .card li { margin: 10px 0; font-size: 14px; color: #6b7280; cursor: pointer; }
        .card li:hover { color: var(--primary); font-weight: bold; }

        /* نافذة الطلب */
        .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.97); z-index: 1000; padding: 40px; overflow-y: auto; }
        .modal-content { max-width: 500px; margin: auto; text-align: right; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- اللوغو -->
    <div class="logo-container">
        <img src="YOUR_LOGO_URL" alt="Normal Agency Logo">
    </div>

    <h1>خدمات وكالة نورمال</h1>

    <!-- الشبكة -->
    <div class="grid">
        <div class="card">
            <h3>نورمال ديجيتال</h3>
            <ul>
                <li onclick="openForm('برمجة خاصة')">برمجة خاصة</li>
                <li onclick="openForm('تصميم مواقع')">تصميم مواقع</li>
                <li onclick="openForm('صناعة محتوى')">صناعة محتوى</li>
            </ul>
        </div>
        <div class="card">
            <h3>نورمال آرت</h3>
            <ul>
                <li onclick="openForm('تصميم داخلي')">تصميم داخلي</li>
                <li onclick="openForm('رسم على الجدران')">رسم على الجدران</li>
                <li onclick="openForm('جرافيك ديزاين')">جرافيك ديزاين</li>
            </ul>
        </div>
        <div class="card">
            <h3>نورمال ستوديو</h3>
            <ul>
                <li onclick="openForm('تعليق صوتي')">تعليق صوتي</li>
                <li onclick="openForm('تصوير منتجات')">تصوير منتجات</li>
                <li onclick="openForm('تصوير فوتوغرافي')">تصوير فوتوغرافي</li>
            </ul>
        </div>
        <div class="card">
            <h3>نورمال برينت</h3>
            <ul>
                <li onclick="openForm('طباعة وتغليف')">طباعة وتغليف</li>
                <li onclick="openForm('تصميم سيرة ذاتية')">تصميم سيرة ذاتية</li>
                <li onclick="openForm('كتابة تقارير')">كتابة تقارير</li>
            </ul>
        </div>
    </div>

    <!-- نافذة نموذج الطلب -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; cursor:pointer;">✖ إغلاق</button>
            <h2 id="serviceTitle"></h2>
            <form onsubmit="alert('تم إرسال طلبك للخدمة!'); return false;">
                <input type="text" placeholder="الاسم الكامل" required>
                <input type="tel" placeholder="رقم الجوال" required>
                <textarea placeholder="تفاصيل الطلب الإضافية"></textarea>
                <button type="submit" class="submit-btn">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <script>
        function openForm(serviceName) {
            document.getElementById('serviceTitle').innerText = "طلب خدمة: " + serviceName;
            document.getElementById('modal').style.display = 'block';
        }
    </script>
</body>
</html>
