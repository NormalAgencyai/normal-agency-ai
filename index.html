<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency</title>
    <style>
        body { background-color: #f4f7fb; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 0 80px 0; }
        .top-bar { background: #007bff; padding: 15px; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .lang-btn { background: white; color: #007bff; border: none; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .logo { width: 250px; margin: 20px auto; }
        .hero-title { font-size: 24px; font-weight: bold; color: #007bff; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px auto; }
        .card { padding: 30px 10px; border: 2px solid #e0e7ff; border-radius: 12px; background: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .card:hover { border-color: #007bff; background: #eef5ff; }
        .assistant-box { background: white; border: 2px solid #e0e7ff; border-radius: 20px; padding: 30px; margin: 40px auto; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; overflow-y: auto; padding: 20px; }
        .form-box { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: right; }
        input, textarea { width: 90%; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid #ccc; display: block; }
        button { background: #007bff; color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #007bff; display: flex; justify-content: space-around; padding: 15px 0; z-index: 2000; }
        .bottom-nav a { text-decoration: none; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn" onclick="toggleLanguage()">🌐 English / العربية</button>
</div>

<div class="container">
    <img src="logo.png.png" alt="شعار نورمال" class="logo">
    <div class="hero-title" data-en="Normal Agency">✦✦ نورمال للخدمات الإلكترونية المتكاملة ✦✦</div>
    
    <div id="services-section">
        <h1 data-en="Our Services">خدماتنا</h1>
        <div class="grid">
            <div class="card" onclick="openModal('Digital')" data-en="Normal Digital">نورمال ديجيتال</div>
            <div class="card" onclick="openModal('Studio')" data-en="Normal Studio">نورمال ستوديو</div>
            <div class="card" onclick="openModal('Art')" data-en="Normal Art">نورمال آرت</div>
            <div class="card" onclick="openModal('Print')" data-en="Normal Print">نورمال برينت</div>
        </div>
    </div>

    <div class="assistant-box">
        <h3 data-en="Normal AI Assistant">المساعد الذكي "نورمال"</h3>
        <form action="https://formspree.io/f/xykvqjek" method="POST">
            <input type="email" name="email" data-en="Your Email" placeholder="بريدك للتواصل" required>
            <textarea name="message" data-en="Write your message here..." placeholder="اكتب رسالتك هنا..." required></textarea>
            <button type="submit" data-en="Send to Assistant">إرسال للمساعد</button>
        </form>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" onclick="window.scrollTo(0,0)" data-en="Home">الرئيسية</a>
    <a href="#services-section" data-en="Services">خدماتنا</a>
    <a href="https://wa.me/966595262869" data-en="Contact Us">تواصل معنا</a>
</div>

<div id="modal" class="modal">
    <div class="form-box">
        <button onclick="document.getElementById('modal').style.display='none'" style="background:red;" data-en="Close">إغلاق ✖</button>
        <h3 id="modalTitle"></h3>
        <ul id="subList" style="text-align:right;"></ul>
    </div>
</div>

<script>
    const data = {
        Digital: { ar: "نورمال ديجيتال", en: "Normal Digital", items: [['تصميم المواقع', 'Web Design'], ['تطوير المتاجر', 'E-commerce'], ['تطبيقات الجوال', 'Mobile Apps'], ['برمجة خاصة', 'Custom Coding'], ['ذكاء اصطناعي', 'AI Solutions']] },
        Studio: { ar: "نورمال ستوديو", en: "Normal Studio", items: [['تصوير المنتجات', 'Product Photography'], ['مونتاج احترافي', 'Video Editing'], ['تعليق صوتي', 'Voice Over'], ['تصوير جوي', 'Drone Shots']] },
        Art: { ar: "نورمال آرت", en: "Normal Art", items: [['هوية بصرية', 'Brand Identity'], ['تصميم شعارات', 'Logo Design'], ['جرافيك', 'Graphic Design'], ['تصميم داخلي', 'Interior Design']] },
        Print: { ar: "نورمال برينت", en: "Normal Print", items: [['بطاقات شخصية', 'Business Cards'], ['بروشورات', 'Brochures'], ['لوحات إعلانية', 'Billboards'], ['تغليف', 'Packaging']] }
    };

    let currentCat = "Digital";

    function toggleLanguage() {
        const isEn = document.documentElement.lang === 'en';
        document.documentElement.lang = isEn ? 'ar' : 'en';
        document.body.dir = isEn ? 'rtl' : 'ltr';
        
        document.querySelectorAll('[data-en]').forEach(el => {
            el.innerText = isEn ? el.dataset.ar : el.dataset.en;
        });
        
        if(document.getElementById('modal').style.display === 'block') openModal(currentCat);
    }

    function openModal(cat) {
        currentCat = cat;
        const isEn = document.documentElement.lang === 'en';
        document.getElementById('modalTitle').innerText = isEn ? data[cat].en : data[cat].ar;
        document.getElementById('subList').innerHTML = data[cat].items.map(i => `<li>✅ ${isEn ? i[1] : i[0]}</li>`).join('');
        document.getElementById('modal').style.display = 'block';
    }
</script>
</body>
</html
