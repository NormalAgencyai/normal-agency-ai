<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency</title>
    <style>
        /* 1. خلفية حيوية متحركة */
        body { 
            background: linear-gradient(-45deg, #f4f7fb, #eef5ff, #d1d9e6, #f4f7fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 0 80px 0; 
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .top-bar { background: #007bff; padding: 15px; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .lang-btn { background: white; color: #007bff; border: none; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* دمج اللوغو والعبارات */
        .header-block { margin-top: 10px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo { width: 400px; margin-bottom: 5px; }
        .hero-title { font-size: 26px; font-weight: 800; color: #007bff; margin: 0; }
        .sub-title { color: #0056b3; font-size: 16px; font-weight: 600; margin: 5px 0 0 0; }
        
        /* 2. تأثير النبض للقوالب لجعلها ملفتة */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px auto; }
        .card { 
            padding: 30px 10px; border: 2px solid #007bff; border-radius: 15px; 
            background: rgba(255, 255, 255, 0.9); cursor: pointer; font-weight: bold; 
            transition: 0.4s; animation: pulse 3s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(0, 123, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); }
        }
        .card:hover { transform: scale(1.05) !important; animation: none; background: #007bff; color: white; }

        /* النافذة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; overflow-y: auto; padding: 20px; }
        .form-box { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: right; }
        .sub-services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 20px 0; }
        .sub-service-item { padding: 15px 5px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; text-align: center; color: #555; }
        .sub-service-item:hover { background: #f0f7ff; border-color: #007bff; color: #007bff; }
        .selected-item { background: #007bff !important; color: white !important; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #007bff; display: flex; justify-content: space-around; padding: 15px 0; z-index: 2000; }
        .bottom-nav a { text-decoration: none; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn" onclick="toggleLanguage()">🌐 English / العربية</button>
</div>

<div class="container">
    <div class="header-block">
        <img src="logo.png.png" alt="شعار نورمال" class="logo">
        <div class="hero-title" data-en="Normal Agency" data-ar="✦✦ نورمال للخدمات الإلكترونية المتكاملة ✦✦">✦✦ نورمال للخدمات الإلكترونية المتكاملة ✦✦</div>
        <div class="sub-title" data-en="From Idea to Execution │ Integrated Digital & Creative Solutions" data-ar="من الفكرة إلى التنفيذ │ حلول رقمية وإبداعية متكاملة">من الفكرة إلى التنفيذ │ حلول رقمية وإبداعية متكاملة</div>
    </div>
    
    <div id="services-section" class="grid">
        <div class="card" onclick="openModal('Digital')" data-en="Normal Digital" data-ar="نورمال ديجيتال">نورمال ديجيتال</div>
        <div class="card" onclick="openModal('Studio')" data-en="Normal Studio" data-ar="نورمال ستوديو">نورمال ستوديو</div>
        <div class="card" onclick="openModal('Art')" data-en="Normal Art" data-ar="نورمال آرت">نورمال آرت</div>
        <div class="card" onclick="openModal('Print')" data-en="Normal Print" data-ar="نورمال برينت">نورمال برينت</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="form-box">
        <button onclick="document.getElementById('modal').style.display='none'" style="background:red; color:white; border:none; padding:10px; cursor:pointer;" data-en="Close" data-ar="إغلاق ✖">إغلاق ✖</button>
        <h3 id="modalTitle" data-en="Service" data-ar="الخدمة">الخدمة</h3>
        <div id="subServicesContainer" class="sub-services-grid"></div>
        <hr>
        <h4 data-en="Order Service" data-ar="طلب الخدمة">طلب الخدمة</h4>
        <form action="https://formspree.io/f/xykvqjek" method="POST">
            <input type="text" id="serviceName" name="Service" placeholder="اختر خدمة..." readonly required>
            <input type="email" name="Email" placeholder="بريدك الإلكتروني" required>
            <textarea name="Details" placeholder="تفاصيل الطلب..." required></textarea>
            <button type="submit" data-en="Send Request" data-ar="إرسال الطلب">إرسال الطلب</button>
        </form>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" onclick="window.scrollTo(0,0)" data-en="Home" data-ar="الرئيسية">الرئيسية</a>
    <a href="#services-section" data-en="Services" data-ar="خدماتنا">خدماتنا</a>
    <a href="https://wa.me/966543262920" target="_blank" data-en="Contact Us" data-ar="تواصل معنا">تواصل معنا</a>
</div>

<script>
    const db = {
        Digital: { ar: "نورمال ديجيتال", en: "Normal Digital", items: [['تصميم المواقع', 'Web Design'], ['تطوير المتاجر', 'E-commerce'], ['تطبيقات الجوال', 'Mobile Apps'], ['برمجة خاصة', 'Custom Coding'], ['أنظمة إدارة', 'Management Systems'], ['ذكاء اصطناعي', 'AI Solutions'], ['أتمتة المهام', 'Automation'], ['واجهات مستخدم', 'UI/UX'], ['محركات بحث', 'SEO'], ['استضافة', 'Hosting'], ['أمن سيبراني', 'Cyber Security'], ['دعم فني', 'Tech Support'], ['ربط منصات', 'Integration'], ['لوحات تحكم', 'Dashboards'], ['صفحات تعريفية', 'Landing Pages']] },
        Studio: { ar: "نورمال ستوديو", en: "Normal Studio", items: [['تصوير المنتجات', 'Product Photo'], ['إعلانات تجارية', 'Commercial Ads'], ['تصوير فعاليات', 'Event Coverage'], ['تصوير عقاري', 'Real Estate'], ['تصوير جوي', 'Drone Shots'], ['فيديو تسويقي', 'Marketing Video'], ['مونتاج احترافي', 'Pro Editing'], ['صناعة محتوى', 'Content Creation'], ['تعليق صوتي', 'Voice Over'], ['بودكاست', 'Podcast'], ['تصوير فوتوغرافي', 'Photography'], ['بث مباشر', 'Live Streaming'], ['موشن جرافيك', 'Motion Graphics'], ['إنتاج إعلانات', 'Ad Production'], ['إدارة استوديوهات', 'Media Management']] },
        Art: { ar: "نورمال آرت", en: "Normal Art", items: [['هوية بصرية', 'Visual Identity'], ['تصميم شعارات', 'Logo Design'], ['تصميم جرافيكي', 'Graphic Design'], ['سوشيال ميديا', 'Social Media'], ['بروفايلات شركات', 'Company Profile'], ['بروشورات', 'Brochures'], ['إنفوجرافيك', 'Infographic'], ['موشن جرافيك', 'Motion Graphics'], ['رسم رقمي', 'Digital Art'], ['رسم جداري', 'Wall Art'], ['تصميم داخلي', 'Interior Design'], ['تغليف وعبوات', 'Packaging'], ['تصميم شخصيات', 'Character Design'], ['عروض تقديمية', 'Presentations'], ['إعادة هوية', 'Rebranding']] },
        Print: { ar: "نورمال برينت", en: "Normal Print", items: [['بطاقات عمل', 'Business Cards'], ['بروشورات مطبوعة', 'Brochures'], ['فلايرات', 'Flyers'], ['كتالوجات', 'Catalogs'], ['لوحات إعلانية', 'Billboards'], ['بنرات', 'Banners'], ['ملصقات', 'Stickers'], ['هدايا دعائية', 'Promo Gifts'], ['ملابس', 'Apparel'], ['دروع وجوائز', 'Awards'], ['تغليف مطبوع', 'Packaging'], ['فواتير', 'Invoices'], ['ملفات شركة', 'Folders'], ['تجهيز معارض', 'Exhibitions'], ['هوية مطبوعة', 'Printed Branding']] }
    };

    function toggleLanguage() {
        const isEn = document.documentElement.lang === 'ar'; 
        document.documentElement.lang = isEn ? 'en' : 'ar';
        document.body.dir = isEn ? 'ltr' : 'rtl';
        document.querySelectorAll('[data-en]').forEach(el => { el.innerText = isEn ? el.dataset.en : el.dataset.ar; });
        refreshModal();
    }

    function openModal(cat) {
        const isEn = document.documentElement.lang === 'en';
        document.getElementById('modalTitle').innerText = isEn ? db[cat].en : db[cat].ar;
        const container = document.getElementById('subServicesContainer');
        container.innerHTML = '';
        db[cat].items.forEach(i => {
            const div = document.createElement('div');
            div.className = 'sub-service-item';
            div.innerText = isEn ? i[1] : i[0];
            div.onclick = function() {
                document.querySelectorAll('.sub-service-item').forEach(el => el.classList.remove('selected-item'));
                div.classList.add('selected-item');
                document.getElementById('serviceName').value = isEn ? i[1] : i[0];
            };
            container.appendChild(div);
        });
        document.getElementById('modal').style.display = 'block';
    }
</script>
</body>
</html>
