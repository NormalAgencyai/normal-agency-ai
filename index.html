<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Agency | خدماتنا</title>
    <style>
        body { background-color: #ffffff; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .logo { width: 280px; height: auto; display: block; margin: 40px auto 20px; }
        .hero { font-size: 18px; margin-bottom: 40px; color: #1e3a5f; font-weight: 500; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; margin: 0 auto; }
        .card { padding: 30px 10px; border: 2px solid #e0e7ff; border-radius: 12px; background: #f8f9ff; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .card:hover { border-color: #007bff; background: #eef5ff; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 1000; padding: 40px; overflow-y: auto; }
        .form-box { max-width: 500px; margin: auto; border: 2px solid #e0e7ff; padding: 20px; border-radius: 16px; text-align: right; }
        ul { list-style: none; padding: 0; }
        li { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; color: #007bff; font-weight: bold; }
        li:hover { background: #f0f7ff; }
        input, textarea { width: 90%; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid #ccc; display: block; }
        button { background: #007bff; color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <img src="logo.png.png" alt="شعار نورمال" class="logo">
    <div class="hero">إبداع بلا حدود | نُحوّل أفكارك إلى تجارب استثنائية</div>

    <div class="grid">
        <div class="card" onclick="showSubServices('نورمال ديجيتال', ['تصميم المواقع الإلكترونية', 'تطوير المتاجر الإلكترونية', 'تطوير تطبيقات الجوال', 'البرمجة الخاصة', 'أنظمة إدارة الأعمال', 'الذكاء الاصطناعي والحلول الذكية', 'أتمتة المهام والعمليات', 'تصميم واجهات المستخدم (UI/UX)', 'تحسين محركات البحث (SEO)', 'إدارة الاستضافة والدومينات', 'الأمن السيبراني', 'الدعم الفني والصيانة', 'الربط بين الأنظمة والمنصات', 'تطوير لوحات التحكم', 'إنشاء الصفحات التعريفية'])">نورمال ديجيتال</div>
        
        <div class="card" onclick="showSubServices('نورمال ستوديو', ['تصوير المنتجات', 'تصوير الإعلانات التجارية', 'تصوير الفعاليات والمناسبات', 'التصوير العقاري', 'التصوير الجوي (درون)', 'إنتاج الفيديوهات التسويقية', 'المونتاج الاحترافي', 'صناعة المحتوى المرئي', 'التعليق الصوتي', 'تسجيل البودكاست', 'التصوير الفوتوغرافي', 'البث المباشر', 'الموشن جرافيك', 'كتابة وإنتاج الإعلانات', 'إدارة الاستوديوهات الإعلامية'])">نورمال ستوديو</div>
        
        <div class="card" onclick="showSubServices('نورمال آرت', ['تصميم الهوية البصرية', 'تصميم الشعارات', 'التصميم الجرافيكي', 'تصميم منشورات السوشيال ميديا', 'تصميم البروفايلات والشركات', 'تصميم البروشورات والفلايرات', 'تصميم الإنفوجرافيك', 'الموشن جرافيك', 'الرسم الرقمي', 'الرسم على الجدران', 'التصميم الداخلي', 'تصميم العبوات والتغليف', 'تصميم الشخصيات والرسومات', 'تصميم العروض التقديمية', 'إعادة تطوير الهويات التجارية'])">نورمال آرت</div>
        
        <div class="card" onclick="showSubServices('نورمال برينت', ['طباعة البطاقات الشخصية', 'طباعة البروشورات', 'طباعة الفلايرات', 'طباعة الكتالوجات', 'طباعة اللوحات الإعلانية', 'طباعة البنرات', 'طباعة الملصقات والستيكرات', 'طباعة الأكواب والهدايا الدعائية', 'طباعة الملابس واليونيفورم', 'طباعة الدروع والشهادات', 'طباعة التغليف والعبوات', 'طباعة دفاتر الفواتير والسندات', 'طباعة ملفات الشركات', 'تجهيز المعارض والفعاليات', 'تنفيذ الهوية البصرية المطبوعة بالكامل'])">نورمال برينت</div>
    </div>

    <!-- نافذة الطلب -->
    <div id="modal" class="modal">
        <div class="form-box">
            <button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; color:red; cursor:pointer;">إغلاق ✖</button>
            <h3 id="modalTitle"></h3>
            <ul id="subList"></ul>
            <form action="https://formspree.io/f/xykvqjek" method="POST">
                <input type="hidden" name="service_detail" id="hiddenService">
                <input type="text" name="name" placeholder="اسمك الكريم" required>
                <textarea name="message" id="messageArea" placeholder="تفاصيل الطلب..."></textarea>
                <button type="submit">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <script>
        function showSubServices(title, items) {
            document.getElementById('modalTitle').innerText = title;
            const list = document.getElementById('subList');
            list.innerHTML = items.map(item => `<li onclick="selectSub('${item}')">✅ ${item}</li>`).join('');
            document.getElementById('modal').style.display = 'block';
        }
        function selectSub(item) {
            document.getElementById('hiddenService').value = item;
            document.getElementById('messageArea').value = "طلب خدمة: " + item;
            alert("تم اختيار: " + item + "، يرجى ملء بياناتك للطلب.");
        }
    </script>
</body>
</html>
