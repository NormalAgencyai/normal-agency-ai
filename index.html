<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency - All Services</title>
    <style>
        body { background-color: #f4f7fb; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 0 80px 0; }
        .top-bar { background: #0056b3; padding: 15px; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .header-block { margin-top: 10px; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
        .logo { width: 400px; display: block; margin: 0; }
        .hero-title { font-size: 26px; font-weight: 800; color: #0056b3; margin: 10px 0 0 0; }
        .sub-title { color: #0056b3; font-size: 16px; font-weight: 600; margin: 5px 0 0 0; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px auto; }
        .card { padding: 30px 10px; border: 2px solid #e0e7ff; border-radius: 12px; background: white; cursor: pointer; font-weight: bold; transition: all 0.5s ease; animation: fadeIn 1.5s; }
        .card:hover { border-color: #0056b3; background: #eef5ff; transform: scale(1.02); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; padding: 20px; overflow-y: auto; }
        .form-box { max-width: 600px; margin: 50px auto; background: white; padding: 25px; border-radius: 20px; text-align: right; }
        .sub-services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin: 15px 0; }
        .sub-service-item { padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; color: #555; transition: 0.3s; }
        .sub-service-item:hover { border-color: #0056b3; color: #0056b3; }
        .selected-item { background: #0056b3 !important; color: white !important; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0056b3; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-bar"></div>

<div class="container">
    <div class="header-block">
        <img src="logo.png.png" alt="شعار نورمال" class="logo">
        <div class="hero-title">✦✦ نورمال للخدمات الإلكترونية المتكاملة ✦✦</div>
        <div class="sub-title">من الفكرة إلى التنفيذ │ حلول رقمية وإبداعية متكاملة</div>
    </div>
    
    <div class="grid">
        <div class="card" onclick="openModal('ديجيتال')">نورمال ديجيتال</div>
        <div class="card" onclick="openModal('ستوديو')">نورمال ستوديو</div>
        <div class="card" onclick="openModal('آرت')">نورمال آرت</div>
        <div class="card" onclick="openModal('برينت')">نورمال برينت</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="form-box">
        <button onclick="document.getElementById('modal').style.display='none'">إغلاق ✖</button>
        <h3 id="modalTitle">الخدمة</h3>
        <div id="subServicesContainer" class="sub-services-grid"></div>
        <form action="https://formspree.io/f/xykvqjek" method="POST">
            <input type="text" id="serviceName" name="Service" placeholder="الخدمة المختارة ستظهر هنا..." readonly required>
            <input type="email" name="Email" placeholder="بريدك الإلكتروني" required>
            <textarea name="Details" placeholder="تفاصيل الطلب..." required></textarea>
            <button type="submit">إرسال الطلب</button>
        </form>
    </div>
</div>

<script>
    const subServices = {
        'ديجيتال': ['تصميم المواقع', 'تطوير المتاجر', 'تطبيقات الجوال', 'برمجة خاصة', 'أنظمة إدارة', 'ذكاء اصطناعي', 'أتمتة المهام', 'واجهات مستخدم', 'محركات بحث', 'استضافة', 'أمن سيبراني', 'دعم فني', 'ربط منصات', 'لوحات تحكم', 'صفحات تعريفية'],
        'ستوديو': ['تصوير المنتجات', 'إعلانات تجارية', 'تصوير فعاليات', 'تصوير عقاري', 'تصوير جوي', 'فيديو تسويقي', 'مونتاج احترافي', 'صناعة محتوى', 'تعليق صوتي', 'بودكاست', 'تصوير فوتوغرافي', 'بث مباشر', 'موشن جرافيك', 'إنتاج إعلانات', 'إدارة استوديوهات'],
        'آرت': ['هوية بصرية', 'تصميم شعارات', 'تصميم جرافيكي', 'سوشيال ميديا', 'بروفايلات شركات', 'بروشورات', 'إنفوجرافيك', 'رسم رقمي', 'رسم جداري', 'تصميم داخلي', 'تغليف وعبوات', 'تصميم شخصيات', 'عروض تقديمية', 'إعادة هوية'],
        'برينت': ['بطاقات عمل', 'بروشورات مطبوعة', 'فلايرات', 'كتالوجات', 'لوحات إعلانية', 'بنرات', 'ملصقات', 'هدايا دعائية', 'ملابس', 'دروع وجوائز', 'تغليف مطبوع', 'فواتير', 'ملفات شركة', 'تجهيز معارض', 'هوية مطبوعة']
    };

    function openModal(cat) {
        document.getElementById('modalTitle').innerText = 'خدمات ' + cat;
        const container = document.getElementById('subServicesContainer');
        container.innerHTML = '';
        subServices[cat].forEach(item => {
            const div = document.createElement('div');
            div.className = 'sub-service-item';
            div.innerText = item;
            div.onclick = function() {
                document.querySelectorAll('.sub-service-item').forEach(el => el.classList.remove('selected-item'));
                div.classList.add('selected-item');
                document.getElementById('serviceName').value = item;
            };
            container.appendChild(div);
        });
        document.getElementById('modal').style.display = 'block';
    }
</script>
</body>
</html>
