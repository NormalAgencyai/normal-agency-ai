<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency | الهوية الرقمية</title>
    <style>
        :root { --primary: #2563eb; --bg: #ffffff; }
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        
        /* الأقسام الرئيسية */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { 
            background: #f9fafb; padding: 40px; border-radius: 25px; cursor: pointer; 
            transition: all 0.5s ease; border: 2px solid transparent; 
        }
        .card:hover { border-color: var(--primary); box-shadow: 0 0 30px rgba(37,99,235,0.2); transform: scale(1.02); }

        /* النافذة التفاعلية */
        .modal { display: none; position: fixed; inset: 0; background: white; z-index: 1000; padding: 50px; overflow-y: auto; text-align: right; }
        .btn-order { background: var(--primary); color: white; padding: 15px 30px; border-radius: 12px; border: none; cursor: pointer; width: 100%; margin-top: 20px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

    <header>
        <h1>Normal Agency 🌐</h1>
        <select><option>العربية (Saudi Arabia)</option><option>English (USA)</option></select>
    </header>

    <div class="grid" id="mainGrid">
        <div class="card" onclick="openSection('نورمال ديجيتال', 'برمجة، تصميم، محتوى')">💻 نورمال ديجيتال</div>
        <div class="card" onclick="openSection('نورمال آرت', 'تصميم داخلي، رسم، جرافيك')">🎨 نورمال آرت</div>
        <div class="card" onclick="openSection('نورمال ستوديو', 'تعليق، تصوير منتجات، فوتوغرافي')">📸 نورمال ستوديو</div>
        <div class="card" onclick="openSection('نورمال برينت', 'طباعة، سيرة ذاتية، تقارير')">🖨️ نورمال برينت</div>
        <div class="card" onclick="openSection('نورمال سفر', 'تأشيرات، طيران، فنادق')">✈️ نورمال سفر وسياحة</div>
    </div>

    <!-- نافذة الخدمة -->
    <div id="modal" class="modal">
        <button onclick="closeModal()">✖ إغلاق</button>
        <h2 id="modalTitle"></h2>
        <form onsubmit="event.preventDefault(); alert('تم استلام طلبكم بنجاح!');">
            <input type="text" placeholder="الاسم الكامل" required>
            <input type="tel" placeholder="رقم الجوال" required>
            <input type="email" placeholder="البريد الإلكتروني" required>
            <textarea placeholder="تفاصيل الطلب"></textarea>
            <select>
                <option>طريقة الدفع: مدى (Mada)</option>
                <option>طريقة الدفع: Apple Pay</option>
                <option>طريقة الدفع: Visa/Mastercard</option>
            </select>
            <button type="submit" class="btn-order">إرسال الطلب وإتمام الدفع (Moyasar)</button>
        </form>
    </div>

    <script>
        function openSection(title, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modal').style.display = 'block';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
