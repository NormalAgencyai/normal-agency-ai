<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Agency | خدماتنا</title>
    <style>
        body { background-color: #ffffff; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        h1 { color: #007bff; margin-bottom: 40px; }
        
        /* توزيع الشبكة 2x2 كما في الصورة */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; margin: 0 auto; }
        
        .card { padding: 30px 10px; border: 2px solid #e0e7ff; border-radius: 12px; background: #f8f9ff; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 18px; }
        .card:hover { border-color: #007bff; background: #eef5ff; transform: scale(1.02); }
        
        /* النافذة المنبثقة للخدمات الفرعية */
        .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 1000; padding: 40px; overflow-y: auto; }
        .form-box { max-width: 500px; margin: auto; border: 2px solid #e0e7ff; padding: 20px; border-radius: 16px; text-align: right; }
        
        ul { list-style: none; padding: 0; }
        li { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; color: #007bff; font-weight: bold; }
        li:hover { background: #f0f7ff; }
        
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; display: block; margin: 10px auto; }
        button { background: #007bff; color: white; border: none; padding: 10px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>خدماتنا</h1>
    <div class="grid">
        <div class="card" onclick="showSub('نورمال ديجيتال', ['برمجة خاصة', 'تصميم مواقع', 'صناعة محتوى'])">نورمال ديجيتال</div>
        <div class="card" onclick="showSub('نورمال آرت', ['تصميم داخلي', 'رسم على الجدران', 'جرافيك ديزاين'])">نورمال آرت</div>
        <div class="card" onclick="showSub('نورمال ستوديو', ['تعليق صوتي', 'تصوير منتجات', 'تصوير فوتوغرافي'])">نورمال ستوديو</div>
        <div class="card" onclick="showSub('نورمال برينت', ['طباعة وتغليف', 'تصميم سيرة ذاتية', 'كتابة تقارير'])">نورمال برينت</div>
    </div>

    <!-- نافذة الطلب -->
    <div id="modal" class="modal">
        <div class="form-box">
            <button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; color:red; font-size:20px; cursor:pointer;">✖</button>
            <h3 id="modalTitle"></h3>
            <ul id="subList"></ul>
            <hr>
            <form action="https://formspree.io/f/xykvqjek" method="POST">
                <input type="hidden" name="service_detail" id="hiddenService">
                <input type="text" name="name" placeholder="الاسم الكامل" required>
                <textarea name="message" id="messageArea" placeholder="تفاصيل الطلب..." required></textarea>
                <button type="submit">إرسال الطلب</button>
            </form>
        </div>
    </div>

            document.getElementById('modalTitle').innerText = title;

            list.innerHTML = items.map(item => `<li onclick="selectSub('${item}')">✅ ${item}</li>`).join('');
            document.getElementById('modal').style.display = 'block';
        }
