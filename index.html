<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency</title>
    <style>
        body { background-color: #f4f7fb; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 0 80px 0; }
        .top-bar { background: #007bff; padding: 15px; display: flex; justify-content: center; }
        .lang-btn { background: white; color: #007bff; border: none; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .logo { width: 250px; margin: 20px auto; }
        .card { padding: 30px 10px; border: 2px solid #e0e7ff; border-radius: 12px; background: white; cursor: pointer; font-weight: bold; margin: 10px; display: inline-block; width: 200px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; overflow-y: auto; padding: 20px; }
        .form-box { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: right; }
        ul { list-style: none; padding: 0; }
        li { margin: 8px 0; padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn" onclick="toggleLanguage()">🌐 English / العربية</button>
</div>

<div class="container">
    <div class="grid">
        <div class="card" onclick="openModal('Digital')" data-en="Normal Digital">نورمال ديجيتال</div>
        <div class="card" onclick="openModal('Studio')" data-en="Normal Studio">نورمال ستوديو</div>
        <div class="card" onclick="openModal('Art')" data-en="Normal Art">نورمال آرت</div>
        <div class="card" onclick="openModal('Print')" data-en="Normal Print">نورمال برينت</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="form-box">
        <button onclick="document.getElementById('modal').style.display='none'" style="background:red; color:white; border:none; padding:10px;">إغلاق ✖</button>
        <h3 id="modalTitle"></h3>
        <ul id="subList"></ul>
    </div>
</div>

<script>
    const db = {
        Digital: { ar: "نورمال ديجيتال", en: "Normal Digital", items: [['تصميم المواقع', 'Web Design'], ['تطوير المتاجر', 'E-commerce'], ['تطبيقات الجوال', 'Mobile Apps'], ['البرمجة الخاصة', 'Custom Programming'], ['أنظمة إدارة', 'Management Systems'], ['ذكاء اصطناعي', 'AI Solutions'], ['أتمتة', 'Automation'], ['واجهات مستخدم', 'UI/UX'], ['محركات بحث', 'SEO'], ['استضافة', 'Hosting'], ['أمن سيبراني', 'Cyber Security'], ['دعم فني', 'Support'], ['ربط منصات', 'Integration'], ['لوحات تحكم', 'Dashboards'], ['صفحات تعريفية', 'Landing Pages']] },
        Studio: { ar: "نورمال ستوديو", en: "Normal Studio", items: [['تصوير منتجات', 'Product Photography'], ['إعلانات', 'Commercial Ads'], ['فعاليات', 'Events'], ['عقاري', 'Real Estate'], ['تصوير جوي', 'Drone Shots'], ['فيديو تسويقي', 'Marketing Video'], ['مونتاج', 'Video Editing'], ['صناعة محتوى', 'Content Creation'], ['تعليق صوتي', 'Voice Over'], ['بودكاست', 'Podcast'], ['تصوير', 'Photography'], ['بث مباشر', 'Live Streaming'], ['موشن جرافيك', 'Motion Graphics'], ['إنتاج إعلانات', 'Ad Production'], ['إدارة استوديوهات', 'Media Management']] },
        Art: { ar: "نورمال آرت", en: "Normal Art", items: [['هوية بصرية', 'Visual Identity'], ['شعارات', 'Logo Design'], ['جرافيك', 'Graphic Design'], ['سوشيال ميديا', 'Social Media'], ['بروفايلات', 'Company Profiles'], ['بروشورات', 'Brochures'], ['إنفوجرافيك', 'Infographic'], ['موشن جرافيك', 'Motion Graphics'], ['رسم رقمي', 'Digital Art'], ['رسم جداري', 'Wall Art'], ['تصميم داخلي', 'Interior Design'], ['تغليف', 'Packaging'], ['شخصيات', 'Character Design'], ['عروض تقديمية', 'Presentations'], ['إعادة هوية', 'Rebranding']] },
        Print: { ar: "نورمال برينت", en: "Normal Print", items: [['بطاقات عمل', 'Business Cards'], ['بروشورات', 'Brochures'], ['فلايرات', 'Flyers'], ['كتالوجات', 'Catalogs'], ['لوحات', 'Billboards'], ['بنرات', 'Banners'], ['ملصقات', 'Stickers'], ['هدايا دعائية', 'Promo Gifts'], ['ملابس', 'Apparel'], ['دروع', 'Awards'], ['تغليف', 'Packaging'], ['فواتير', 'Invoices'], ['ملفات', 'Folders'], ['معارض', 'Exhibitions'], ['هوية مطبوعة', 'Printed Branding']] }
    };

    let currentCat = "Digital";

    function toggleLanguage() {
        const isEn = document.documentElement.lang === 'en';
        document.documentElement.lang = isEn ? 'ar' : 'en';
        document.body.dir = isEn ? 'rtl' : 'ltr';
        
        // تحديث النصوص الرئيسية
        document.querySelectorAll('[data-en]').forEach(el => {
            const arText = el.dataset.ar || el.innerText;
            if(!el.dataset.ar) el.dataset.ar = arText;
            el.innerText = isEn ? el.dataset.en : el.dataset.ar;
        });

        // التعديل الهام: إعادة رسم النافذة إذا كانت مفتوحة فوراً
        if(document.getElementById('modal').style.display === 'block') {
            openModal(currentCat);
        }
    }

    function openModal(cat) {
        currentCat = cat;
        const isEn = document.documentElement.lang === 'en';
        document.getElementById('modalTitle').innerText = isEn ? db[cat].en : db[cat].ar;
        document.getElementById('subList').innerHTML = db[cat].items.map(i => `<li>✅ ${isEn ? i[1] : i[0]}</li>`).join('');
        document.getElementById('modal').style.display = 'block';
    }
</script>
</body>
</html>
