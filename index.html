<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0d0717; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; }
        #splash { position: fixed; width: 100%; height: 100%; background: #0d0717; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s; }
        .logo { width: 200px; filter: brightness(0) invert(1); }
        .card { border: 1px solid #333; padding: 20px; margin: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #a855f7; }
    </style>
</head>
<body>
    <!-- صفحة الترحيب -->
    <div id="splash">
        <img src="logo.png.PNG" class="logo">
        <h2>نورمال.. حيث تصبح الفكرة استثناءً</h2>
    </div>

    <!-- محتوى الموقع -->
    <header style="padding: 50px;">
        <img src="logo.png.PNG" class="logo" style="width: 100px;">
        <h1>Normal Agency</h1>
    </header>
    <a href="interior.html" style="text-decoration: none; color: white;">
        <div class="card">التصميم الداخلي</div>
    </a>

    <script>
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; 
                           setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 1000);
        }, 3000);
    </script>
</body>
</html>
