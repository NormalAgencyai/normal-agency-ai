<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency | نورمال للخدمات</title>
    <style>
        body { background-color: #f4f7fb; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 0 80px 0; }
        .top-bar { background: #007bff; padding: 15px; display: flex; justify-content: center; }
        .lang-btn { background: white; color: #007bff; border: none; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .logo { width: 250px; margin: 20px auto; }
        .hero-title { font-size: 24px; font-weight: bold; color: #007bff; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px auto; }
        .card { padding: 30px 10px; border: 2px solid #e0e7ff; border-radius: 12px; background: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .card:hover { border-color: #007bff; background: #eef5ff; }
        .assistant-box { background: white; border: 2px solid #e0e7ff; border-radius: 20px; padding: 30px; margin: 40px auto; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; overflow-y: auto; padding: 20px; }
        .form-box { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: right; }
        input, textarea { width: 90%; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid #ccc; display: block; }
        button { background: #007bff; color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #007bff; display: flex; justify-content: space-around; padding: 15px 0; z-index: 2000; }
        .bottom-nav a { text-decoration: none; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn" onclick="switchLanguage()">🌐 English / العربية</button>
</div>

<div class="container">
    <img src="logo.png.png" alt="شعار نورمال" class="logo">
    <div class="hero-title" data-en="Normal Agency for Integrated Electronic Services">✦✦ نورمال للخدمات الإلكترونية المتكاملة ✦✦</div>
    
    <div id="services-section">
        <h1 data-en="Our Services">خدماتنا</h1>
        <div class="grid">
            <div class="card" onclick="openModal('Normal Digital', 'نورمال ديجيتال', ['تصميم المواقع الإلكترونية', 'تطوير المتاجر الإلكترونية', 'تطوير تطبيقات الجوال', 'البرمجة الخاصة', 'أنظمة إدارة الأعمال', 'الذكاء الاصطناعي والحلول الذكية', 'أتمتة المهام والعمليات', 'تصميم واجهات المستخدم (UI/UX)', 'تحسين محركات البحث (SEO)', 'إدارة الاستضافة والدومينات', 'الأمن السيبراني', 'الدعم الفني والصيانة', 'الربط بين الأنظمة والمنصات', 'تطوير لوحات التحكم', 'إنشاء الصفحات التعريفية'])" data-en="Normal Digital">نورمال ديجيتال</div>
            <div class="card" onclick="openModal('Normal Studio', 'نورمال ستوديو', ['تصوير المنتجات', 'تصوير الإعلانات التجارية', 'تصوير الفعاليات والمناسبات', 'التصوير العقاري', 'التصوير الجوي (درون)', 'إنتاج الفيديوهات التسويقية', 'المونتاج الاحترافي', 'صناعة المحتوى المرئي', 'التعليق الصوتي', 'تسجيل البودكاست', 'التصوير الفوتوغرافي', 'البث المباشر', 'الموشن جرافيك', 'كتابة وإنتاج الإعلانات', 'إدارة الاستوديوهات الإعلامية'])" data-en="Normal Studio">نورمال ستوديو</div>
            <div class="card" onclick="openModal('Normal Art', 'نورمال آرت', ['تصميم الهوية البصرية', 'تصميم الشعارات', 'التصميم الجرافيكي', 'تصميم منشورات السوشيال ميديا', 'تصميم البروفايلات والشركات', 'تصميم البروشورات والفلايرات', 'تصميم الإنفوجرافيك', 'الموشن جرافيك', 'الرسم الرقمي', 'الرسم على الجدران', 'التصميم الداخلي', 'تصميم العبوات والتغليف', 'تصميم الشخصيات والرسومات', 'تصميم العروض التقديمية', 'إعادة تطوير الهويات التجارية'])" data-en="Normal Art">نورمال آرت</div>
            <div class="card" onclick="openModal('Normal Print', 'نورمال برينت', ['طباعة البطاقات الشخصية', 'طباعة البروشورات', 'طباعة الفلايرات', 'طباعة الكتالوجات', 'طباعة اللوحات الإعلانية', 'طباعة البنرات', 'طباعة الملصقات والستيكرات', 'طباعة الأكواب والهدايا الدعائية', 'طباعة الملابس واليونيفورم', 'طباعة الدروع والشهادات', 'طباعة التغليف والعبوات', 'طباعة دفاتر الفواتير والسندات', 'طباعة ملفات الشركات', 'تجهيز المعارض والفعاليات', 'تنفيذ الهوية البصرية المطبوعة بالكامل'])" data-en="Normal Print">نورمال برينت</div>
        </div>
    </div>

    <div class="assistant-box">
        <h3 data-en="Normal AI Assistant">المساعد الذكي "نورمال"</h3>
        <form action="https://formspree.io/f/xykvqjek" method="POST">
            <input type="email" name="email" data-en="Your Email" placeholder="بريدك للتواصل" required>
            <textarea name="message" data-en="Write your message here..." placeholder="اكتب رسالتك هنا..." required></textarea>
            <button type="submit" data-en="Send to Assistant">إرسال للمساعد</button>
        </form>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" onclick="window.scrollTo(0,0)" data-en="Home">الرئيسية</a>
    <a href="#services-section" data-en="Services">خدماتنا</a>
    <a href="https://wa.me/966595262869" data-en="Contact Us">تواصل معنا</a>
</div>

<div id="modal" class="modal">
    <div class="form-box">
        <button onclick="document.getElementById('modal').style.display='none'" style="background:red;" data-en="Close">إغلاق ✖</button>
        <h3 id="modalTitle"></h3>
        <ul id="subList" style="list-style:none; padding:0; text-align:right;"></ul>
        <form action="https://formspree.io/f/xykvqjek" method="POST">
            <input type="text" name="service" id="hiddenService" data-en="Required Service" placeholder="الخدمة المطلوبة" required readonly>
            <input type="email" name="email" data-en="Email" placeholder="البريد الإلكتروني" required>
            <textarea name="message" data-en="Request details..." placeholder="تفاصيل الطلب..."></textarea>
            <button type="submit" data-en="Send Request">إرسال الطلب</button>
        </form>
    </div>
</div>

<script>
    let currentModalData = { en: "", ar: "", items: [] };
    function switchLanguage() {
        const isEnglish = document.documentElement.lang === 'en';
        document.documentElement.lang = isEnglish ? 'ar' : 'en';
        document.body.dir = isEnglish ? 'rtl' : 'ltr';
        document.querySelectorAll('[data-en]').forEach(el => {
            const arText = el.dataset.ar || el.innerText || el.placeholder;
            if(!el.dataset.ar) el.dataset.ar = arText;
            if(el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = isEnglish ? el.dataset.en : el.dataset.ar;
            else if(el.innerText && !el.querySelector('ul')) el.innerText = isEnglish ? el.dataset.en : el.dataset.ar;
        });
        if(document.getElementById('modal').style.display === 'block') openModal(currentModalData.en, currentModalData.ar, currentModalData.items);
    }
    function openModal(enTitle, arTitle, items) {
        currentModalData = { en: enTitle, ar: arTitle, items: items };
        const isEnglish = document.documentElement.lang === 'en';
        document.getElementById('modalTitle').innerText = isEnglish ? enTitle : arTitle;
        document.getElementById('hiddenService').value = isEnglish ? enTitle : arTitle;
        document.getElementById('subList').innerHTML = items.map(item => `<li>✅ ${item}</li>`).join('');
        document.getElementById('modal').style.display = 'block';
    }
</script>
</body>
</html>
