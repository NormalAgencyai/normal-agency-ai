<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency</title>
    <style>
        body { background-color: #f4f7fb; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 0 80px 0; }
        .top-bar { background: #007bff; padding: 15px; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .lang-btn { background: white; color: #007bff; border: none; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* تنسيق اللوغو والعبارات */
        .header-block { margin-top: 10px; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
        .logo { width: 450px; display: block; margin: 0; }
        .hero-title { font-size: 28px; font-weight: 800; color: #0056b3; margin: 10px 0 0 0; }
        .sub-title { color: #0056b3; font-size: 18px; font-weight: 600; margin: 5px 0 0 0; }
        
        /* تأثيرات القوالب */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px auto; }
        .card { padding: 30px 10px; border: 2px solid #e0e7ff; border-radius: 12px; background: white; cursor: pointer; font-weight: bold; transition: 0.5s; animation: fadeIn 1.5s ease-in-out; }
        .card:hover { border-color: #0056b3; background: #eef5ff; transform: scale(1.03); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* نافذة الطلب */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; overflow-y: auto; padding: 20px; }
        .form-box { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: right; }
        .sub-services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 20px 0; }
        .sub-service-item { padding: 15px 5px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; text-align: center; color: #555; }
        .sub-service-item:hover { background: #f0f7ff; border-color: #007bff; color: #007bff; }
        .selected-item { background: #007bff !important; color: white !important; border-color: #007bff; }
        
        button { background: #007bff; color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #007bff; display: flex; justify-content: space-around; padding: 15px 0; z-index: 2000; }
        .bottom-nav a { text-decoration: none; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn" onclick="toggleLanguage()">🌐 English / العربية</button>
</div>

<div class="container">
    <div class="header-block">
        <img src="logo.png.png" alt="شعار نورمال" class="logo">
        <div class="hero-title" data-en="Normal Agency" data-ar="✦✦ نورمال للخدمات الإلكترونية المتكاملة ✦✦">✦✦ نورمال للخدمات الإلكترونية المتكاملة ✦✦</div>
        <div class="sub-title" data-en="From Idea to Execution │ Integrated Digital & Creative Solutions" data-ar="من الفكرة إلى التنفيذ │ حلول رقمية وإبداعية متكاملة">من الفكرة إلى التنفيذ │ حلول رقمية وإبداعية متكاملة</div>
    </div>
    
    <div id="services-section">
        <h1 data-en="Our Services" data-ar="خدماتنا">خدماتنا</h1>
        <div class="grid">
            <div class="card" onclick="openModal('Digital')">نورمال ديجيتال</div>
            <div class="card" onclick="openModal('Studio')">نورمال ستوديو</div>
            <div class="card" onclick="openModal('Art')">نورمال آرت</div>
            <div class="card" onclick="openModal('Print')">نورمال برينت</div>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="form-box">
        <button onclick="document.getElementById('modal').style.display='none'" style="background:red; color:white;">إغلاق ✖</button>
        <h3 id="modalTitle">الخدمة</h3>
        <div id="subServicesContainer" class="sub-services-grid"></div>
        <form action="https://formspree.io/f/xykvqjek" method="POST">
            <input type="text" id="serviceName" name="Service" placeholder="اختر خدمة..." readonly required style="width:100%; padding:10px;">
            <input type="email" name="Email" placeholder="بريدك الإلكتروني" required style="width:100%; padding:10px; margin:10px 0;">
            <textarea name="Details" placeholder="تفاصيل الطلب..." required style="width:100%; padding:10px;"></textarea>
            <button type="submit">إرسال الطلب</button>
        </form>
    </div>
</div>

<script>
    // حركة تلقائية للقوالب لجعل الصفحة تبدو متغيرة
    setInterval(() => {
        const cards = document.querySelectorAll('.card');
        const randomCard = cards[Math.floor(Math.random() * cards.length)];
        randomCard.style.borderColor = '#0056b3';
        setTimeout(() => randomCard.style.borderColor = '#e0e7ff', 1000);
    }, 4000);

    const db = {
        Digital: { items: [['تصميم المواقع'], ['تطوير المتاجر'], ['تطبيقات الجوال']] },
        Studio: { items: [['تصوير المنتجات'], ['إعلانات تجارية'], ['مونتاج احترافي']] },
        Art: { items: [['هوية بصرية'], ['تصميم شعارات'], ['تصميم جرافيكي']] },
        Print: { items: [['بطاقات عمل'], ['بروشورات'], ['لوحات إعلانية']] }
    };

    function openModal(cat) {
        document.getElementById('modalTitle').innerText = cat;
        const container = document.getElementById('subServicesContainer');
        container.innerHTML = '';
        db[cat].items.forEach(i => {
            const div = document.createElement('div');
            div.className = 'sub-service-item';
            div.innerText = i[0];
            div.onclick = function() {
                document.querySelectorAll('.sub-service-item').forEach(el => el.classList.remove('selected-item'));
                div.classList.add('selected-item');
                document.getElementById('serviceName').value = i[0];
            };
            container.appendChild(div);
        });
        document.getElementById('modal').style.display = 'block';
    }
</script>
</body>
</html>
