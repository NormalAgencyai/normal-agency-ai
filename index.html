<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Agency | خدماتنا</title>
    <style>
        body { background-color: #ffffff; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .logo { width: 280px; height: auto; display: block; margin: 40px auto 20px; }
        .hero { font-size: 18px; margin-bottom: 30px; color: #1e3a5f; font-weight: 500; }
        
        h1 { color: #007bff; margin-bottom: 30px; } /* العنوان المضاف */
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; margin: 0 auto 40px; }
        .card { padding: 30px 10px; border: 2px solid #e0e7ff; border-radius: 12px; background: #f8f9ff; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .card:hover { border-color: #007bff; background: #eef5ff; }
        
        /* تصميم المساعد الذكي */
        .assistant-box { border: 2px solid #e0e7ff; border-radius: 16px; padding: 25px; max-width: 500px; margin: 40px auto; background: #fdfdfd; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 1000; padding: 40px; overflow-y: auto; }
        .form-box { max-width: 500px; margin: auto; border: 2px solid #e0e7ff; padding: 20px; border-radius: 16px; text-align: right; }
        ul { list-style: none; padding: 0; }
        li { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; color: #007bff; font-weight: bold; }
        li:hover { background: #f0f7ff; }
        input, textarea { width: 90%; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid #ccc; display: block; }
        button { background: #007bff; color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <img src="logo.png.png" alt="شعار نورمال" class="logo">
    <div class="hero">إبداع بلا حدود | نُحوّل أفكارك إلى تجارب استثنائية</div>

    <h1>خدماتنا</h1>

    <div class="grid">
        <div class="card" onclick="showSubServices('نورمال ديجيتال', [...])">نورمال ديجيتال</div>
        </div>

    <div class="assistant-box">
        <h3 style="color: #007bff;">المساعد الذكي "نورمال"</h3>
        <p style="font-size: 14px; color: #445566;">مرحباً بك! أنا مساعد نورمال، كيف يمكنني مساعدتك اليوم؟</p>
        <form action="https://formspree.io/f/xykvqjek" method="POST">
            <input type="email" name="email" placeholder="بريدك للتواصل" required>
            <textarea name="message" placeholder="اكتب رسالتك هنا..." required></textarea>
            <button type="submit">إرسال</button>
        </form>
    </div>

    </body>
</html>
