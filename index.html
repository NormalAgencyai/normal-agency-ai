<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0d0717; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 5vw; }
        .logo { width: 40vw; max-width: 200px; filter: brightness(0) invert(1); margin-top: 5vh; }
        .hero { font-size: 4vw; margin: 5vh 0; color: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4vw; width: 100%; max-width: 600px; margin: 0 auto; }
        .card { padding: 6vw 2vw; border: 1px solid #4a356a; border-radius: 4vw; background: rgba(169, 85, 247, 0.05); font-size: 4vw; }
        .assistant-box { border: 2px solid #a855f7; border-radius: 6vw; padding: 8vw; margin: 8vw auto; background: rgba(255,255,255,0.02); width: 90%; }
        input { width: 90%; padding: 4vw; border-radius: 2vw; border: 1px solid #4a356a; background: #0d0717; color: white; margin: 4vw 0; font-size: 4vw; }
        button { background: #a855f7; color: white; border: none; padding: 3vw 10vw; border-radius: 2vw; font-size: 4.5vw; }
        .footer { margin-top: 10vw; color: #888; font-size: 3.5vw; line-height: 2; }
    </style>
</head>
<body>

    <img src="logo.png.PNG" class="logo">
    <div class="hero">إبداع بلا حدود | نُحوّل أفكارك إلى تجارب استثنائية</div>

    <h2 style="font-size: 6vw;">خدماتنا</h2>
    <div class="grid">
        <div class="card">تصوير المنتجات</div>
        <div class="card">التصميم الداخلي</div>
        <div class="card">إدارة السوشيال ميديا</div>
        <div class="card">الهوية البصرية</div>
    </div>

    <div class="assistant-box">
        <h3 style="font-size: 5vw;">المساعد الذكي "نورمال"</h3>
        <p style="font-size: 4vw;">مرحباً بك! أنا مساعد نورمال، كيف يمكنني مساعدتك اليوم؟</p>
        <input type="text" placeholder="اكتب رسالتك هنا...">
        <br>
        <button>إرسال</button>
    </div>

    <div class="footer">
        الرئيسية | خدماتنا | تواصل معنا<br>
        الرئيسية | خدماتنا | المساعد الذكي
    </div>

</body>
</html>
