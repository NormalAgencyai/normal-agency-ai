<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency</title>
    <style>
        body { background-color: #f4f7fb; color: #050a14; font-family: 'Segoe UI', sans-serif; }
        .top-bar { background: #007bff; padding: 15px; text-align: center; }
        .lang-btn { background: white; color: #007bff; border-radius: 20px; padding: 8px 25px; cursor: pointer; border: none; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { padding: 20px; background: white; border: 1px solid #ddd; cursor: pointer; border-radius: 10px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; padding: 20px; overflow-y: auto; }
        .form-box { background: white; max-width: 500px; margin: 20px auto; padding: 20px; border-radius: 15px; text-align: right; }
        ul { padding: 0; list-style: none; }
        li { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn" onclick="toggleLanguage()">🌐 English / العربية</button>
</div>

<div class="container">
    <div class="grid">
        <div class="card" onclick="openModal('Digital')" data-en="Normal Digital">نورمال ديجيتال</div>
        <div class="card" onclick="openModal('Studio')" data-en="Normal Studio">نورمال ستوديو</div>
        <div class="card" onclick="openModal('Art')" data-en="Normal Art">نورمال آرت</div>
        <div class="card" onclick="openModal('Print')" data-en="Normal Print">نورمال برينت</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="form-box">
        <button onclick="document.getElementById('modal').style.display='none'" data-en="Close">إغلاق ✖</button>
        <h3 id="modalTitle"></h3>
        <ul id="subList"></ul>
    </div>
</div>

<script>
    const db = {
        Digital: { ar: "نورمال ديجيتال", en: "Normal Digital", items: [['تصميم المواقع', 'Web Design'], ['تطوير المتاجر', 'E-commerce'], ['تطبيقات الجوال', 'Mobile Apps'], ['برمجة خاصة', 'Custom Coding'], ['أنظمة إدارة', 'Management Systems'], ['ذكاء اصطناعي', 'AI Solutions'], ['أتمتة المهام', 'Automation'], ['واجهات مستخدم', 'UI/UX'], ['محركات بحث', 'SEO'], ['استضافة', 'Hosting'], ['أمن سيبراني', 'Cyber Security'], ['دعم فني', 'Support'], ['ربط منصات', 'Integration'], ['لوحات تحكم', 'Dashboards'], ['صفحات تعريفية', 'Landing Pages']] },
        Studio: { ar: "نورمال ستوديو", en: "Normal Studio", items: [['تصوير المنتجات', 'Product Photography'], ['إعلانات تجارية', 'Commercial Ads'], ['فعاليات', 'Events'], ['عقاري', 'Real Estate'], ['تصوير جوي', 'Drone Shots'], ['فيديو تسويقي', 'Marketing Video'], ['مونتاج', 'Video Editing'], ['صناعة محتوى', 'Content Creation'], ['تعليق صوتي', 'Voice Over'], ['بودكاست', 'Podcast'], ['تصوير فوتوغرافي', 'Photography'], ['بث مباشر', 'Live Streaming'], ['موشن جرافيك', 'Motion Graphics'], ['إنتاج إعلانات', 'Ad Production'], ['إدارة استوديوهات', 'Media Management']] },
        Art: { ar: "نورمال آرت", en: "Normal Art", items: [['هوية بصرية', 'Visual Identity'], ['شعارات', 'Logo Design'], ['جرافيك', 'Graphic Design'], ['سوشيال ميديا', 'Social Media'], ['بروفايلات', 'Company Profiles'], ['بروشورات', 'Brochures'], ['إنفوجرافيك', 'Infographic'], ['موشن جرافيك', 'Motion Graphics'], ['رسم رقمي', 'Digital Art'], ['رسم جداري', 'Wall Art'], ['تصميم داخلي', 'Interior Design'], ['تغليف', 'Packaging'], ['شخصيات', 'Character Design'], ['عروض تقديمية', 'Presentations'], ['إعادة هوية', 'Rebranding']] },
        Print: { ar: "نورمال برينت", en: "Normal Print", items: [['بطاقات عمل', 'Business Cards'], ['بروشورات', 'Brochures'], ['فلايرات', 'Flyers'], ['كتالوجات', 'Catalogs'], ['لوحات إعلانية', 'Billboards'], ['بنرات', 'Banners'], ['ملصقات', 'Stickers'], ['هدايا دعائية', 'Promo Gifts'], ['ملابس', 'Apparel'], ['دروع', 'Awards'], ['تغليف', 'Packaging'], ['فواتير', 'Invoices'], ['ملفات', 'Folders'], ['معارض', 'Exhibitions'], ['هوية مطبوعة', 'Printed Branding']] }
    };

    let currentCat = "Digital";

    function toggleLanguage() {
        // تبديل لغة الصفحة
        const isEn = document.documentElement.lang === 'en';
        document.documentElement.lang = isEn ? 'ar' : 'en';
        document.body.dir = isEn ? 'rtl' : 'ltr';
        
        // تحديث النصوص الثابتة
        document.querySelectorAll('[data-en]').forEach(el => {
            const arText = el.dataset.ar || el.innerText;
            if(!el.dataset.ar) el.dataset.ar = arText;
            el.innerText = isEn ? el.dataset.en : el.dataset.ar;
        });

        // التعديل الجوهري: إذا كانت النافذة مفتوحة، قم بإعادة تحميل محتواها فوراً
        if(document.getElementById('modal').style.display === 'block') {
            updateModalContent(currentCat);
        }
    }

    function openModal(cat) {
        currentCat = cat;
        updateModalContent(cat);
        document.getElementById('modal').style.display = 'block';
    }

    function updateModalContent(cat) {
        const isEn = document.documentElement.lang === 'en';
        document.getElementById('modalTitle').innerText = isEn ? db[cat].en : db[cat].ar;
        document.getElementById('subList').innerHTML = db[cat].items.map(item => `<li>✅ ${isEn ? item[1] : item[0]}</li>`).join('');
    }
</script>
</body>
</html>
