<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency | نورمال</title>
    <style>
        :root { --bg: #050a14; --card-bg: #111827; --text: #ffffff; --accent: #007bff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .logo { width: 220px; margin: 30px auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card-bg); border: 1px solid #1f2937; padding: 40px; border-radius: 20px; cursor: pointer; transition: 0.4s; }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); }
        
        /* تصميم النافذة الفاخرة */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 40px; overflow-y: auto; }
        .modal-content { background: white; color: #050a14; max-width: 600px; margin: 5% auto; padding: 40px; border-radius: 30px; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-pay { background: var(--accent); color: white; border: none; padding: 15px 40px; border-radius: 10px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <button onclick="toggleLang()" style="position:fixed; top:20px; left:20px; cursor:pointer;">EN / عربي</button>
    <img src="logo.png.png" alt="Normal Logo" class="logo">

    <div class="grid">
        <div class="card" onclick="openModal('Studio')"><h2>نورمال ستوديو</h2></div>
        <div class="card" onclick="openModal('Digital')"><h2>نورمال ديجيتال</h2></div>
        <div class="card" onclick="openModal('Print')"><h2>نورمال برينت</h2></div>
        <div class="card" onclick="openModal('Art')"><h2>نورمال آرت</h2></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h1 id="modalTitle"></h1>
            <p id="modalDesc">سيتم تسليم الطلب خلال 12 ساعة من الدفع.</p>
            <form action="https://formspree.io/f/YOUR_ID" method="POST">
                <input type="text" name="name" placeholder="الاسم الكريم" required>
                <input type="email" name="email" placeholder="البريد الإلكتروني" required>
                <textarea name="details" placeholder="تفاصيل طلبك"></textarea>
                <button type="submit" class="btn-pay">إتمام الطلب والدفع</button>
            </form>
            <br><button onclick="document.getElementById('modal').style.display='none'">إغلاق</button>
        </div>
    </div>

    <script>
        function toggleLang() {
            const html = document.documentElement;
            html.dir = html.dir === 'rtl' ? 'ltr' : 'rtl';
        }
        function openModal(s) {
            document.getElementById('modalTitle').innerText = "طلب خدمة: " + s;
            document.getElementById('modal').style.display = 'block';
        }
    </script>
</body>
</html>
