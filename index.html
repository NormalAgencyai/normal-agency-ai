<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency</title>
    <style>
        body { background-color: #f4f7fb; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 0 80px 0; }
        .top-bar { background: #007bff; padding: 15px; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .lang-btn { background: white; color: #007bff; border: none; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* تم تكبير اللوغو هنا إلى 350px */
        .logo { width: 350px; margin: 30px auto; display: block; }
        
        .hero-title { font-size: 24px; font-weight: bold; color: #007bff; margin: 10px 0; }
        .sub-title { color: #555; font-size: 16px; margin-bottom: 20px; font-weight: 500; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px auto; }
        .card { padding: 30px 10px; border: 2px solid #e0e7ff; border-radius: 12px; background: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .card:hover { border-color: #007bff; background: #eef5ff; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; overflow-y: auto; padding: 20px; }
        .form-box { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: right; }
        
        /* تصميم المربعات للخدمات الفرعية */
        .sub-services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 20px 0; }
        .sub-service-item { padding: 15px 5px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; text-align: center; color: #555; }
        .sub-service-item:hover { background: #f0f7ff; border-color: #007bff; color: #007bff; }
        .selected-item { background: #007bff !important; color: white !important; border-color: #007bff; }
        
        input, textarea { width: 94%; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid #ccc; display: block; }
        button { background: #007bff; color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #007bff; display: flex; justify-content: space-around; padding: 15px 0; z-index: 2000; }
        .bottom-nav a { text-decoration: none; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn" onclick="toggleLanguage()">🌐 English / العربية</button>
</div>

<div class="container">
    <img src="logo.png.png" alt="شعار نورمال" class="logo">
    <div class="hero-title" data-en="Normal Agency">✦✦ نورمال للخدمات الإلكترونية المتكاملة ✦✦</div>
    <div class="sub-title" data-en="From Idea to Execution │ Integrated Digital & Creative Solutions">من الفكرة إلى التنفيذ │ حلول رقمية وإبداعية متكاملة</div>
    
    <div id="services-section">
        <h1 data-en="Our Services">خدماتنا</h1>
        <div class="grid">
            <div class="card" onclick="openModal('Digital')" data-en="Normal Digital">نورمال ديجيتال</div>
            <div class="card" onclick="openModal('Studio')" data-en="Normal Studio">نورمال ستوديو</div>
            <div class="card" onclick="openModal('Art')" data-en="Normal Art">نورمال آرت</div>
            <div class="card" onclick="openModal('Print')" data-en="Normal Print">نورمال برينت</div>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="form-box">
        <button onclick="document.getElementById('modal').style.display='none'" style="background:red; color:white; border:none; padding:10px; cursor:pointer;" data-en="Close">إغلاق ✖</button>
        <h3 id="modalTitle"></h3>
        <div id="subServicesContainer" class="sub-services-grid"></div>
        <hr>
        <form action="https://formspree.io/f/xykvqjek" method="POST">
            <input type="text" id="serviceName" name="Service" placeholder="اختر خدمة من المربعات أعلاه..." readonly required>
            <input type="email" name="Email" placeholder="بريدك الإلكتروني" required>
            <textarea name="Details" placeholder="تفاصيل الطلب..." required></textarea>
            <button type="submit" data-en="Send Request">إرسال الطلب عبر الإيميل</button>
        </form>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" onclick="window.scrollTo(0,0)" data-en="Home">الرئيسية</a>
    <a href="#services-section" data-en="Services">خدماتنا</a>
    <a href="https://wa.me/966543262920" target="_blank" data-en="Contact Us">تواصل معنا</a>
</div>

<script>
    /* السكربت كما هو دون تغيير */
    const db = {
        Digital: { ar: "نورمال ديجيتال", en: "Normal Digital", items: [['تصميم المواقع', 'Web Design'], ['تطوير المتاجر', 'E-commerce'], ['تطبيقات الجوال', 'Mobile Apps'], ['برمجة خاصة', 'Custom Coding'], ['أنظمة إدارة', 'Management Systems'], ['ذكاء اصطناعي', 'AI Solutions'], ['أتمتة المهام', 'Automation'], ['واجهات مستخدم', 'UI/UX'], ['محركات بحث', 'SEO'], ['استضافة', 'Hosting'], ['أمن سيبراني', 'Cyber Security'], ['دعم فني', 'Tech Support'], ['ربط منصات', 'Integration'], ['لوحات تحكم', 'Dashboards'], ['صفحات تعريفية', 'Landing Pages']] },
        Studio: { ar: "نورمال ستوديو", en: "Normal Studio", items: [['تصوير المنتجات', 'Product Photo'], ['إعلانات تجارية', 'Commercial Ads'], ['تصوير فعاليات', 'Event Coverage'], ['تصوير عقاري', 'Real Estate'], ['تصوير جوي', 'Drone Shots'], ['فيديو تسويقي', 'Marketing Video'], ['مونتاج احترافي', 'Pro Editing'], ['صناعة محتوى', 'Content Creation'], ['تعليق صوتي', 'Voice Over'], ['بودكاست', 'Podcast'], ['تصوير فوتوغرافي', 'Photography'], ['بث مباشر', 'Live Streaming'], ['موشن جرافيك', 'Motion Graphics'], ['إنتاج إعلانات', 'Ad Production'], ['إدارة استوديوهات', 'Media Management']] },
        Art: { ar: "نورمال آرت", en: "Normal Art", items: [['هوية بصرية', 'Visual Identity'], ['تصميم شعارات', 'Logo Design'], ['تصميم جرافيكي', 'Graphic Design'], ['سوشيال ميديا', 'Social Media'], ['بروفايلات شركات', 'Company Profile'], ['بروشورات', 'Brochures'], ['إنفوجرافيك', 'Infographic'], ['موشن جرافيك', 'Motion Graphics'], ['رسم رقمي', 'Digital Art'], ['رسم جداري', 'Wall Art'], ['تصميم داخلي', 'Interior Design'], ['تغليف وعبوات', 'Packaging'], ['تصميم شخصيات', 'Character Design'], ['عروض تقديمية', 'Presentations'], ['إعادة هوية', 'Rebranding']] },
        Print: { ar: "نورمال برينت", en: "Normal Print", items: [['بطاقات عمل', 'Business Cards'], ['بروشورات مطبوعة', 'Brochures'], ['فلايرات', 'Flyers'], ['كتالوجات', 'Catalogs'], ['لوحات إعلانية', 'Billboards'], ['بنرات', 'Banners'], ['ملصقات', 'Stickers'], ['هدايا دعائية', 'Promo Gifts'], ['ملابس', 'Apparel'], ['دروع وجوائز', 'Awards'], ['تغليف مطبوع', 'Packaging'], ['فواتير', 'Invoices'], ['ملفات شركة', 'Folders'], ['تجهيز معارض', 'Exhibitions'], ['هوية مطبوعة', 'Printed Branding']] }
    };

    let currentCat = "Digital";

    function toggleLanguage() {
        const isEn = document.documentElement.lang === 'en';
        document.documentElement.lang = isEn ? 'ar' : 'en';
        document.body.dir = isEn ? 'rtl' : 'ltr';
        document.querySelectorAll('[data-en]').forEach(el => {
            if(!el.dataset.ar) el.dataset.ar = el.innerText || el.placeholder;
            if(el.placeholder) el.placeholder = isEn ? el.dataset.en : el.dataset.ar;
            else el.innerText = isEn ? el.dataset.en : el.dataset.ar;
        });
        refreshModal();
    }

    function openModal(cat) {
        currentCat = cat;
        refreshModal();
        document.getElementById('modal').style.display = 'block';
    }

    function refreshModal() {
        const isEn = document.documentElement.lang === 'en';
        document.getElementById('modalTitle').innerText = isEn ? db[currentCat].en : db[currentCat].ar;
        const container = document.getElementById('subServicesContainer');
        container.innerHTML = '';
        db[currentCat].items.forEach(i => {
            const div = document.createElement('div');
            div.className = 'sub-service-item';
            div.innerText = isEn ? i[1] : i[0];
            div.onclick = function() {
                document.querySelectorAll('.sub-service-item').forEach(el => el.classList.remove('selected-item'));
                div.classList.add('selected-item');
                document.getElementById('serviceName').value = isEn ? i[1] : i[0];
            };
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
