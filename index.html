<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency</title>
    <style>
        body { background-color: #f4f7fb; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 0 80px 0; }
        .top-bar { background: #007bff; padding: 15px; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); gap: 10px; }
        .lang-btn { background: white; color: #007bff; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .logo { width: 400px; margin: 20px 0; }
        .hero-title { font-size: 28px; font-weight: 800; color: #007bff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 20px auto; }
        .card { padding: 20px; border: 2px solid #e0e7ff; border-radius: 12px; background: white; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .card:hover { border-color: #007bff; background: #eef5ff; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; overflow-y: auto; padding: 20px; }
        .form-box { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .sub-services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 15px 0; }
        .sub-service-item { padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .selected-item { background: #007bff !important; color: white !important; }
        button { background: #007bff; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn" onclick="setLang('ar')">العربية</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
    <button class="lang-btn" onclick="setLang('fr')">Français</button>
</div>

<div class="container">
    <img src="logo.png.png" class="logo">
    <h1 id="heroTitle" class="hero-title">نورمال للخدمات الإلكترونية المتكاملة</h1>
    
    <div class="grid">
        <div class="card" onclick="openModal('Digital')">نورمال ديجيتال</div>
        <div class="card" onclick="openModal('Studio')">نورمال ستوديو</div>
        <div class="card" onclick="openModal('Art')">نورمال آرت</div>
        <div class="card" onclick="openModal('Print')">نورمال برينت</div>
        <div class="card" onclick="openModal('Marketing')">نورمال للتسويق</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="form-box">
        <button onclick="document.getElementById('modal').style.display='none'" style="background:red;">إغلاق ✖</button>
        <h3 id="modalTitle">الخدمة</h3>
        <div id="subServicesContainer" class="sub-services-grid"></div>
        <form action="https://formspree.io/f/xykvqjek" method="POST">
            <input type="text" id="serviceName" name="Service" placeholder="الخدمة المختارة" readonly required>
            <input type="text" name="Name" placeholder="الاسم" required>
            <input type="email" name="Email" placeholder="البريد الإلكتروني للعمل" required>
            <input type="tel" name="Phone" placeholder="رقم الهاتف" required>
            <input type="text" name="Company" placeholder="اسم الشركة" required>
            <textarea name="Details" placeholder="تفاصيل الطلب..."></textarea>
            <button type="submit">إرسال الطلب</button>
        </form>
    </div>
</div>

<script>
    const data = {
        Digital: { ar: "نورمال ديجيتال", en: "Normal Digital", fr: "Normal Digital", items: [['تصميم المواقع', 'Web Design', 'Web Design'], ['تطوير المتاجر', 'E-commerce', 'E-commerce'], ['تطبيقات الجوال', 'Mobile Apps', 'Applications Mobiles'], ['برمجة خاصة', 'Custom Coding', 'Programmation'], ['أنظمة إدارة', 'Management Systems', 'Systèmes de gestion'], ['ذكاء اصطناعي', 'AI Solutions', 'Solutions IA'], ['أتمتة المهام', 'Automation', 'Automatisation'], ['واجهات مستخدم', 'UI/UX', 'UI/UX'], ['محركات بحث', 'SEO', 'SEO'], ['استضافة', 'Hosting', 'Hébergement'], ['أمن سيبراني', 'Cyber Security', 'Cybersécurité'], ['دعم فني', 'Tech Support', 'Support technique'], ['ربط منصات', 'Integration', 'Intégration'], ['لوحات تحكم', 'Dashboards', 'Tableaux de bord'], ['صفحات تعريفية', 'Landing Pages', 'Pages de destination']] },
        Studio: { ar: "نورمال ستوديو", en: "Normal Studio", fr: "Normal Studio", items: [['تصوير المنتجات', 'Product Photo', 'Photo produit'], ['إعلانات تجارية', 'Commercial Ads', 'Publicités'], ['تصوير فعاليات', 'Event Coverage', 'Couverture d\'événements'], ['تصوير عقاري', 'Real Estate', 'Immobilier'], ['تصوير جوي', 'Drone Shots', 'Drones'], ['فيديو تسويقي', 'Marketing Video', 'Vidéo marketing'], ['مونتاج احترافي', 'Pro Editing', 'Montage pro'], ['صناعة محتوى', 'Content Creation', 'Création de contenu'], ['تعليق صوتي', 'Voice Over', 'Voix off'], ['بودكاست', 'Podcast', 'Podcast'], ['تصوير فوتوغرافي', 'Photography', 'Photographie'], ['بث مباشر', 'Live Streaming', 'Streaming en direct'], ['موشن جرافيك', 'Motion Graphics', 'Motion Design'], ['إنتاج إعلانات', 'Ad Production', 'Production pub'], ['إدارة استوديوهات', 'Media Management', 'Gestion média']] },
        Art: { ar: "نورمال آرت", en: "Normal Art", fr: "Normal Art", items: [['هوية بصرية', 'Visual Identity', 'Identité visuelle'], ['تصميم شعارات', 'Logo Design', 'Conception de logo'], ['تصميم جرافيكي', 'Graphic Design', 'Design graphique'], ['سوشيال ميديا', 'Social Media', 'Réseaux sociaux'], ['بروفايلات شركات', 'Company Profile', 'Profil d\'entreprise'], ['بروشورات', 'Brochures', 'Brochures'], ['إنفوجرافيك', 'Infographic', 'Infographie'], ['رسم رقمي', 'Digital Art', 'Art numérique'], ['رسم جداري', 'Wall Art', 'Art mural'], ['تصميم داخلي', 'Interior Design', 'Design d\'intérieur'], ['تغليف وعبوات', 'Packaging', 'Emballage'], ['تصميم شخصيات', 'Character Design', 'Design de personnage'], ['عروض تقديمية', 'Presentations', 'Présentations'], ['إعادة هوية', 'Rebranding', 'Rebranding'], ['تصميم إبداعي', 'Creative Design', 'Design créatif']] },
        Print: { ar: "نورمال برينت", en: "Normal Print", fr: "Normal Print", items: [['بطاقات عمل', 'Business Cards', 'Cartes de visite'], ['بروشورات مطبوعة', 'Brochures', 'Brochures imprimées'], ['فلايرات', 'Flyers', 'Flyers'], ['كتالوجات', 'Catalogs', 'Catalogues'], ['لوحات إعلانية', 'Billboards', 'Panneaux'], ['بنرات', 'Banners', 'Bannières'], ['ملصقات', 'Stickers', 'Autocollants'], ['هدايا دعائية', 'Promo Gifts', 'Cadeaux promo'], ['ملابس', 'Apparel', 'Vêtements'], ['دروع وجوائز', 'Awards', 'Prix'], ['تغليف مطبوع', 'Packaging', 'Emballage imprimé'], ['فواتير', 'Invoices', 'Factures'], ['ملفات شركة', 'Folders', 'Dossiers'], ['تجهيز معارض', 'Exhibitions', 'Expositions'], ['هوية مطبوعة', 'Printed Branding', 'Identité imprimée']] },
        Marketing: { ar: "نورمال للتسويق", en: "Normal Marketing", fr: "Normal Marketing", items: [['إدارة حسابات', 'Social Media Management', 'Gestion réseaux sociaux'], ['حملات إعلانية', 'Ads Campaigns', 'Campagnes pub'], ['تحليل بيانات', 'Data Analysis', 'Analyse de données'], ['تسويق بالمحتوى', 'Content Marketing', 'Marketing de contenu'], ['تحسين الظهور', 'Visibility Optimization', 'Optimisation visibilité'], ['استراتيجيات نمو', 'Growth Strategies', 'Stratégies de croissance'], ['أبحاث سوق', 'Market Research', 'Étude de marché'], ['إدارة علاقات', 'CRM Management', 'Gestion CRM'], ['تسويق عبر البريد', 'Email Marketing', 'Email marketing'], ['شراكات مؤثرين', 'Influencer Marketing', 'Marketing d\'influence'], ['تخطيط حملات', 'Campaign Planning', 'Planification'], ['تقارير أداء', 'Performance Reports', 'Rapports'], ['تسويق تابعة', 'Affiliate Marketing', 'Affiliation'], ['تجربة عميل', 'Customer Experience', 'Expérience client'], ['تطوير هوية رقمية', 'Digital Branding', 'Branding digital']] }
    };

    let currentCat = "Digital", lang = "ar";

    function setLang(l) { lang = l; document.documentElement.lang = l; document.documentElement.dir = (l === 'ar' ? 'rtl' : 'ltr'); updateUI(); }
    
    function updateUI() {
        const titles = {ar: "نورمال للخدمات الإلكترونية المتكاملة", en: "Normal Integrated Electronic Services", fr: "Normal Services Électroniques Intégrés"};
        document.getElementById('heroTitle').innerText = titles[lang];
    }

    function openModal(cat) {
        currentCat = cat;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('modalTitle').innerText = data[cat][lang];
        const container = document.getElementById('subServicesContainer');
        container.innerHTML = '';
        data[cat].items.forEach(i => {
            let div = document.createElement('div');
            div.className = 'sub-service-item';
            div.innerText = (lang === 'ar' ? i[0] : (lang === 'en' ? i[1] : i[2]));
            div.onclick = function() {
                document.querySelectorAll('.sub-service-item').forEach(el => el.classList.remove('selected-item'));
                div.classList.add('selected-item');
                document.getElementById('serviceName').value = div.innerText;
            };
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
