<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency</title>
    <style>
        body { background-color: #f4f7fb; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 0 80px 0; transition: 0.3s; }
        .top-bar { background: #007bff; padding: 15px; display: flex; justify-content: center; }
        .lang-btn { background: white; color: #007bff; border: none; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .hero-title { font-size: 32px; font-weight: bold; color: #007bff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { padding: 40px 20px; border-radius: 20px; background: white; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); font-weight: bold; transition: 0.3s; }
        .card:hover { border: 2px solid #007bff; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; overflow-y: auto; }
        .form-box { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: right; }
        input, textarea { width: 90%; padding: 15px; margin: 10px auto; border-radius: 10px; border: 1px solid #ddd; display: block; }
        button { background: #007bff; color: white; border: none; padding: 15px 40px; border-radius: 10px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #eee; z-index: 2000; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="lang-btn" onclick="switchLanguage()">🌐 Switch Language</button>
    </div>

    <div class="container">
        <div class="hero-title" data-en="Normal Agency">نورمال للخدمات الإلكترونية</div>
        
        <div id="services-section">
            <h1 data-en="Our Services">خدماتنا</h1>
            <div class="grid">
                <div class="card" onclick="showSubServices('نورمال ديجيتال', ['تصميم المواقع الإلكترونية', 'تطوير المتاجر الإلكترونية', 'تطوير تطبيقات الجوال', 'البرمجة الخاصة', 'أنظمة إدارة الأعمال', 'الذكاء الاصطناعي'])" data-en="Normal Digital">نورمال ديجيتال</div>
                <div class="card" onclick="showSubServices('نورمال ستوديو', ['تصوير المنتجات', 'تصوير الإعلانات التجارية', 'إنتاج الفيديوهات التسويقية', 'المونتاج الاحترافي', 'التعليق الصوتي'])" data-en="Normal Studio">نورمال ستوديو</div>
                <div class="card" onclick="showSubServices('نورمال آرت', ['تصميم الهوية البصرية', 'تصميم الشعارات', 'التصميم الجرافيكي', 'تصميم منشورات السوشيال ميديا', 'تصميم البروفايلات'])" data-en="Normal Art">نورمال آرت</div>
                <div class="card" onclick="showSubServices('نورمال برينت', ['طباعة البطاقات الشخصية', 'طباعة البروشورات', 'طباعة الفلايرات', 'طباعة الكتالوجات', 'طباعة اللوحات الإعلانية'])" data-en="Normal Print">نورمال برينت</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" onclick="window.scrollTo(0, 0);" data-en="Home">الرئيسية</a>
        <a href="#services-section" data-en="Services">خدماتنا</a>
        <a href="https://wa.me/966595262869" data-en="Contact Us">تواصل معنا</a>
    </div>

    <div id="modal" class="modal">
        <div class="form-box">
            <button onclick="document.getElementById('modal').style.display='none'" data-en="Close">إغلاق ✖</button>
            <h3 id="modalTitle"></h3>
            <ul id="subList"></ul>
            <form action="https://formspree.io/f/xykvqjek" method="POST">
                <input type="text" name="service" id="hiddenService" data-en="Required Service" placeholder="الخدمة المطلوبة" readonly>
                <input type="email" name="email" data-en="Email" placeholder="البريد الإلكتروني" required>
                <textarea name="message" data-en="Request Details..." placeholder="تفاصيل الطلب..."></textarea>
                <button type="submit" data-en="Send Request">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <script>
        function switchLanguage() {
            const isEnglish = document.documentElement.lang === 'en';
            document.documentElement.lang = isEnglish ? 'ar' : 'en';
            document.body.dir = isEnglish ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-en]').forEach(el => {
                const arText = el.dataset.ar || el.innerText || el.placeholder;
                const enText = el.getAttribute('data-en');
                if (!el.dataset.ar) el.dataset.ar = arText;
                if (el.innerText) el.innerText = isEnglish ? enText : arText;
                if (el.placeholder) el.placeholder = isEnglish ? enText : arText;
            });
        }
        function showSubServices(title, items) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('subList').innerHTML = items.map(item => `<li>✅ ${item}</li>`).join('');
            document.getElementById('modal').style.display = 'block';
            document.getElementById('hiddenService').value = title;
        }
    </script>
</body>
</html>
