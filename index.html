<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0d0717; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .logo { width: 120px; filter: brightness(0) invert(1); margin-top: 30px; }
        .hero { margin: 30px 0; color: #ccc; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 0 auto; }
        .card { padding: 20px; border: 1px solid #333; border-radius: 10px; background: #160d26; }
        .main-card { margin-top: 20px; padding: 25px; border: 1px solid #a855f7; border-radius: 10px; background: #160d26; max-width: 470px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <img src="logo.png.PNG" class="logo">
    <div class="hero">
        <p>إبداع بلا حدود | نُحوّل أفكارك إلى تجارب استثنائية</p>
    </div>

    <h2 style="margin-bottom: 20px;">خدماتنا</h2>
    
    <div class="grid">
        <div class="card">تصوير المنتجات</div>
        <div class="card">التصميم الداخلي</div>
        <div class="card">إدارة السوشيال ميديا</div>
        <div class="card">الهوية البصرية</div>
    </div>

    <div class="main-card">
        <h3>المساعد الذكي "نورمال"</h3>
    </div>

</body>
</html>
