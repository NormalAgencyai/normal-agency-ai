<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0d0717; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .logo { width: 180px; filter: brightness(0) invert(1); margin: 30px 0; }
        .hero { font-size: 18px; margin-bottom: 40px; color: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; margin: 0 auto; }
        .card { padding: 30px; border: 1px solid #4a356a; border-radius: 15px; background: rgba(169, 85, 247, 0.1); cursor: pointer; transition: 0.4s; font-size: 18px; }
        .card:hover { border-color: #a855f7; box-shadow: 0 0 15px #a855f7; background: rgba(169, 85, 247, 0.2); }
        .assistant-box { border: 2px solid #a855f7; border-radius: 20px; padding: 30px; max-width: 600px; margin: 40px auto; background: rgba(255,255,255,0.05); }
        input { width: 90%; padding: 15px; border-radius: 10px; border: 1px solid #4a356a; background: #0d0717; color: white; margin: 20px 0; }
        button { background: #a855f7; color: white; border: none; padding: 15px 40px; border-radius: 10px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <img src="logo.png.PNG" class="logo">
    <div class="hero">إبداع بلا حدود | نُحوّل أفكارك إلى تجارب استثنائية</div>

    <h2 style="margin-bottom: 30px;">خدماتنا</h2>
    <div class="grid">
        <div class="card">تصوير المنتجات</div>
        <div class="card">التصميم الداخلي</div>
        <div class="card">إدارة السوشيال ميديا</div>
        <div class="card">الهوية البصرية</div>
    </div>

    <div class="assistant-box">
        <h3>المساعد الذكي "نورمال"</h3>
        <p>مرحباً بك! أنا مساعد نورمال، كيف يمكنني مساعدتك اليوم؟</p>
        <input type="text" placeholder="اكتب رسالتك هنا...">
        <br>
        <button>إرسال</button>
    </div>

    <!-- القائمة السفلية التي كنت تسأل عنها -->
    <div style="margin-top: 50px; color: #888; font-size: 14px; border-top: 1px solid #333; padding-top: 20px;">
        <p>الرئيسية | خدماتنا | تواصل معنا</p>
        <p>الرئيسية | خدماتنا | المساعد الذكي</p>
    </div>

</body>
</html>
