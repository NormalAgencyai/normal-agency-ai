<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Agency | التطبيق</title>
    <style>
        :root { --bg: #ffffff; --text: #111827; --accent: #2563eb; --card: #f9fafb; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* الرأس */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* شبكة الخدمات */
        .services-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 20px; }
        .service-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #e5e7eb; cursor: pointer; }
        .service-card:hover { border-color: var(--accent); }
        
        /* شريط التنقل السفلي */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 15px 0; }
        
        .btn-action { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; width: 90%; margin: 10px auto; display: block; }
    </style>
</head>
<body>

    <header class="header">
        <strong>Normal Agency</strong>
        <div>🔔</div>
    </header>

    <div style="padding: 0 20px;">
        <h2>مرحباً بك في نورمال 👋</h2>
        <input type="text" placeholder="ابحث عن خدمة أو مشروع..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
    </div>

    <div class="services-grid">
        <div class="service-card">🎨 جرافيك</div>
        <div class="service-card">💻 برمجة</div>
        <div class="service-card">📸 تصوير</div>
        <div class="service-card">🎙️ تعليق</div>
        <div class="service-card">🖨️ طباعة</div>
        <div class="service-card">💡 تصميم</div>
    </div>

    <div style="padding: 20px;">
        <div style="background: #eef2ff; padding: 20px; border-radius: 16px; text-align: center;">
            <h3>جرب الذكاء الاصطناعي</h3>
            <button class="btn-action">ابدأ الآن</button>
        </div>
    </div>

    <nav class="nav-bar">
        <span>🏠 الرئيسية</span>
        <span>📁 المشاريع</span>
        <span>❤️ المفضلة</span>
        <span>👤 الحساب</span>
    </nav>

</body>
</html>
