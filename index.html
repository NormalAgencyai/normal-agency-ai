<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { background-color: #0d0717; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .logo-anim { 
            width: 250px; 
            animation: fadeInOut 3s ease-in-out forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <img src="logo.png.PNG" class="logo-anim" alt="Normal Agency">
    <script>
        // الانتقال التلقائي بعد 3 ثوانٍ
        setTimeout(function() {
            window.location.href = "home.html";
        }, 3000);
    </script>
</body>
</html>
