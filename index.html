<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Agency | نورمال</title>
    <style>
        body { background-color: #ffffff; color: #050a14; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* تصميم الشعار المتناسق مع الاسم المرفوع logo.png.png */
        .logo { 
            width: 280px; 
            height: auto; 
            display: block; 
            margin: 40px auto 20px; 
            border-radius: 12px; 
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s; 
        }
        
        .hero { font-size: 18px; margin-bottom: 40px; color: #1e3a5f; letter-spacing: 0.5px; font-weight: 500; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 500px; margin: 0 auto; }
        
        .card { 
            padding: 25px 15px; border: 2px solid #e0e7ff; border-radius: 12px; 
            background: #f8f9ff; color: #050a14;
            cursor: pointer; transition: all 0.3s ease; font-weight: bold;
        }
        .card:hover { border-color: #007bff; background: #eef5ff; }
        
        .assistant-box { border: 2px solid #e0e7ff; border-radius: 16px; padding: 25px; max-width: 500px; margin: 40px auto; background: #fdfdfd; }
        input, textarea { width: 85%; padding: 12px; border-radius: 8px; border: 1px solid #c0c9d9; background: #ffffff; color: #050a14; margin-bottom: 15px; }
        button { background: #007bff; color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        
        .footer { margin-top: 50px; color: #8899aa; font-size: 12px; border-top: 1px solid #e0e7ff; padding-top: 20px; }
    </style>
</head>
<body>

    <!-- تم استخدام الاسم المطابق للملف المرفوع في المستودع -->
    <img src="logo.png.png" alt="شعار نورمال" class="logo">
    
    <div class="hero">إبداع بلا حدود | نُحوّل أفكارك إلى تجارب استثنائية</div>

<body>

    <h1 id="title">خدماتنا</h1>
    <div class="grid" id="mainGrid">
        <div class="card" onclick="showSubServices('التصميم الداخلي', ['تصميم غرف', 'تصميم مكاتب', 'استشارات هندسية'])">التصميم الداخلي</div>
        <div class="card" onclick="showSubServices('تصوير المنتجات', ['تصوير فوتوغرافي', 'تصوير فيديو', 'تحرير صور'])">تصوير المنتجات</div>
        <div class="card" onclick="showSubServices('الهوية البصرية', ['تصميم شعار', 'دليل علامة تجارية', 'خطوط'])">الهوية البصرية</div>
        <div class="card" onclick="showSubServices('إدارة السوشيال ميديا', ['إدارة حسابات', 'إعلانات ممولة', 'صناعة محتوى'])">إدارة السوشيال ميديا</div>
    </div>

    <!-- نافذة الخدمات الفرعية -->
    <div id="modal" class="modal">
        <div class="form-box">
            <button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; color:red; cursor:pointer;">إغلاق ✖</button>
            <h3 id="modalTitle"></h3>
            <ul id="subList"></ul>
            <hr>
            <form action="https://formspree.io/f/xykvqjek" method="POST">
                <input type="hidden" name="service_detail" id="hiddenService">
                <input type="text" name="name" placeholder="اسمك الكريم" required>
                <textarea name="message" id="messageArea" placeholder="تفاصيل الطلب..."></textarea>
                <button type="submit">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <script>
        function showSubServices(title, items) {
            document.getElementById('modalTitle').innerText = title;
            const list = document.getElementById('subList');
            list.innerHTML = items.map(item => `<li onclick="selectSub('${item}')">✅ ${item}</li>`).join('');
            document.getElementById('modal').style.display = 'block';
        }

        function selectSub(item) {
            document.getElementById('hiddenService').value = item;
            document.getElementById('messageArea').value = "طلب خدمة فرعية: " + item;
            alert("تم اختيار: " + item + "، يرجى ملء بياناتك للطلب.");
        }
    </script>
