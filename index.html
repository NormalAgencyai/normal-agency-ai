<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency</title>
    <style>
        body { background-color: #f4f7fb; color: #050a14; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .top-bar { background: #007bff; padding: 15px; }
        .lang-btn { background: white; color: #007bff; border: none; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px auto; }
        .card { padding: 30px 10px; border: 2px solid #e0e7ff; background: white; cursor: pointer; font-weight: bold; border-radius: 12px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; overflow-y: auto; padding: 20px; }
        .form-box { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: right; }
        ul { text-align: right; list-style: none; padding: 0; }
        li { margin: 8px 0; padding: 8px; border-bottom: 1px solid #eee; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="lang-btn" onclick="toggleLanguage()">🌐 English / العربية</button>
</div>

<div class="container">
    <div class="grid">
        <div class="card" onclick="openModal('Digital')">نورمال ديجيتال</div>
        <div class="card" onclick="openModal('Studio')">نورمال ستوديو</div>
        <div class="card" onclick="openModal('Art')">نورمال آرت</div>
        <div class="card" onclick="openModal('Print')">نورمال برينت</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="form-box">
        <button onclick="document.getElementById('modal').style.display='none'" style="background:red; color:white; border:none; padding:10px;">إغلاق ✖</button>
        <h3 id="modalTitle"></h3>
        <ul id="subList"></ul>
    </div>
</div>

<script>
    const data = {
        Digital: { ar: "نورمال ديجيتال", en: "Normal Digital", items: [['تصميم المواقع الإلكترونية', 'Web Design'], ['تطوير المتاجر الإلكترونية', 'E-commerce'], ['تطوير تطبيقات الجوال', 'Mobile Apps'], ['البرمجة الخاصة', 'Custom Coding'], ['أنظمة إدارة الأعمال', 'Business Systems'], ['الذكاء الاصطناعي', 'AI Solutions'], ['أتمتة المهام', 'Automation'], ['تصميم واجهات المستخدم', 'UI/UX'], ['تحسين محركات البحث', 'SEO'], ['إدارة الاستضافة', 'Hosting'], ['الأمن السيبراني', 'Cyber Security'], ['الدعم الفني', 'Tech Support'], ['الربط بين الأنظمة', 'API Integration'], ['تطوير لوحات التحكم', 'Dashboards'], ['إنشاء الصفحات التعريفية', 'Landing Pages']] },
        Studio: { ar: "نورمال ستوديو", en: "Normal Studio", items: [['تصوير المنتجات', 'Product Photography'], ['تصوير الإعلانات التجارية', 'Commercial Ads'], ['تصوير الفعاليات والمناسبات', 'Events'], ['التصوير العقاري', 'Real Estate'], ['التصوير الجوي (درون)', 'Drone Shots'], ['إنتاج الفيديوهات التسويقية', 'Marketing Videos'], ['المونتاج الاحترافي', 'Professional Editing'], ['صناعة المحتوى المرئي', 'Visual Content'], ['التعليق الصوتي', 'Voice Over'], ['تسجيل البودكاست', 'Podcast'], ['التصوير الفوتوغرافي', 'Photography'], ['البث المباشر', 'Live Streaming'], ['الموشن جرافيك', 'Motion Graphics'], ['كتابة وإنتاج الإعلانات', 'Ad Production'], ['إدارة الاستوديوهات الإعلامية', 'Media Management']] },
        Art: { ar: "نورمال آرت", en: "Normal Art", items: [['تصميم الهوية البصرية', 'Brand Identity'], ['تصميم الشعارات', 'Logo Design'], ['التصميم الجرافيكي', 'Graphic Design'], ['تصميم منشورات السوشيال ميديا', 'Social Media Design'], ['تصميم البروفايلات والشركات', 'Company Profiles'], ['تصميم البروشورات والفلايرات', 'Brochures'], ['تصميم الإنفوجرافيك', 'Infographics'], ['الموشن جرافيك', 'Motion Graphics'], ['الرسم الرقمي', 'Digital Art'], ['الرسم على الجدران', 'Wall Art'], ['التصميم الداخلي', 'Interior Design'], ['تصميم العبوات والتغليف', 'Packaging'], ['تصميم الشخصيات والرسومات', 'Character Design'], ['تصميم العروض التقديمية', 'Presentations'], ['إعادة تطوير الهويات التجارية', 'Rebranding']] },
        Print: { ar: "نورمال برينت", en: "Normal Print", items: [['طباعة البطاقات الشخصية', 'Business Cards'], ['طباعة البروشورات', 'Brochures'], ['طباعة الفلايرات', 'Flyers'], ['طباعة الكتالوجات', 'Catalogs'], ['طباعة اللوحات الإعلانية', 'Billboards'], ['طباعة البنرات', 'Banners'], ['طباعة الملصقات والستيكرات', 'Stickers'], ['طباعة الأكواب والهدايا الدعائية', 'Promotional Gifts'], ['طباعة الملابس واليونيفورم', 'Apparel Printing'], ['طباعة الدروع والشهادات', 'Awards'], ['طباعة التغليف والعبوات', 'Packaging'], ['طباعة دفاتر الفواتير والسندات', 'Invoices'], ['طباعة ملفات الشركات', 'Company Folders'], ['تجهيز المعارض والفعاليات', 'Exhibitions'], ['تنفيذ الهوية البصرية المطبوعة', 'Printed Branding']] }
    };

    let currentKey = "Digital";

    function toggleLanguage() {
        const html = document.documentElement;
        html.lang = (html.lang === 'en') ? 'ar' : 'en';
        html.dir = (html.lang === 'en') ? 'ltr' : 'rtl';
        if (document.getElementById('modal').style.display === 'block') openModal(currentKey);
    }

    function openModal(key) {
        currentKey = key;
        const isEn = document.documentElement.lang === 'en';
        document.getElementById('modalTitle').innerText = isEn ? data[key].en : data[key].ar;
        document.getElementById('subList').innerHTML = data[key].items.map(item => `<li>✅ ${isEn ? item[1] : item[0]}</li>`).join('');
        document.getElementById('modal').style.display = 'block';
    }
</script>
</body>
</html>
