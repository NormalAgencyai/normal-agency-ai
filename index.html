<!DOCTYPE <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Agency | نورمال</title>
    <style>
        body { background-color: #050a14; color: #e0e0e0; text-align: center; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: <img src="logo.png.png" alt="NORMAL Agency" class="logo">

    <img src="logo.png.png" alt="NORMAL Agency" class="logo">
      /* البطاقات */
        .card { 
            padding: 25px 15px; border: 1px solid #1e3a5f; border-radius: 8px; 
            background: linear-gradient(145deg, #0a1424, #050a14); 
            cursor: pointer; transition: all 0.3s ease; 
        }
        .card:hover { border-color: #007bff; }
        .card:active { background: #007bff; color: white; transform: scale(0.95); }
        
        /* المساعد */
        .assistant-box { border: 1px solid #1e3a5f; border-radius: 12px; padding: 25px; max-width: 500px; margin: 40px auto; background: rgba(5, 10, 20, 0.9); }
        input, textarea { width: 85%; padding: 12px; border-radius: 4px; border: 1px solid #1e3a5f; background: #0a1424; color: white; margin-bottom: 15px; }
        button { background: #007bff; color: white; border: none; padding: 12px 40px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        
        .footer { margin-top: 50px; color: #556688; font-size: 12px; border-top: 1px solid #1e3a5f; padding-top: 20px; }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/3s6H3fW/logo.png" alt="NORMAL Agency" class="logo">
    
    <div class="hero">إبداع بلا حدود | نُحوّل أفكارك إلى تجارب استثنائية</div>

    <h2 style="font-size: 20px; margin-bottom: 20px; color: #007bff;">خدماتنا</h2>
    <div class="grid">
        <div class="card">تصوير المنتجات</div>
        <div class="card">التصميم الداخلي</div>
        <div class="card">إدارة السوشيال ميديا</div>
        <div class="card">الهوية البصرية</div>
    </div>

    <div class="assistant-box">
        <h3 style="color: #007bff;">المساعد الذكي "نورمال"</h3>
        <p style="font-size: 14px;">مرحباً بك! أنا مساعد نورمال، كيف يمكنني مساعدتك اليوم؟</p>
        <form action="https://formspree.io/f/xykvqjek" method="POST">
            <input type="email" name="email" placeholder="بريدك للتواصل" required>
            <textarea name="message" placeholder="اكتب رسالتك هنا..." required></textarea>
            <br>
            <button type="submit">إرسال</button>
        </form>
    </div>

    <div class="footer">
        <p>الرئيسية | خدماتنا | تواصل معنا | المساعد الذكي</p>
    </div>

</body>
</html>
