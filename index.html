<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>
        /* شاشة الترحيب */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0d0717; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 1s ease;
        }
        .logo-white { width: 200px; filter: brightness(0) invert(1); }
    </style>
</head>
<body style="background-color: #0d0717; color: white;">

    <!-- صفحة الترحيب -->
    <div id="splash-screen">
        <img src="logo.png.PNG" class="logo-white">
        <h2 style="margin-top: 20px; font-family: sans-serif;">مرحباً بك في عالم "نورمال"</h2>
    </div>

    <!-- المحتوى الرئيسي (سيظهر بعد اختفاء صفحة الترحيب) -->
    <header style="text-align: center; padding: 50px;">
        <img src="logo.png.PNG" class="logo-white" style="width: 150px;">
        <h1>نورمال | Normal Agency</h1>
    </header>

    <div style="display: flex; justify-content: center; flex-wrap: wrap;">
        <a href="interior.html" style="text-decoration: none;"><div class="card">التصميم الداخلي</div></a>
        <div class="card">تصوير المنتجات</div>
        <div class="card">الهوية البصرية</div>
    </div>

    <script>
        // إخفاء صفحة الترحيب بعد 3 ثوانٍ
        setTimeout(() => { document.getElementById('splash-screen').style.opacity = '0'; 
                           setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 1000);
        }, 3000);
    </script>
</body>
</html>
