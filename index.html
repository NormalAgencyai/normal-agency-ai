<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Normal Agency</title>
    <style>
        body { background-color: #f4f7fb; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        .top-bar { background: #007bff; padding: 15px; color: white; }
        .lang-select { padding: 8px; border-radius: 20px; border: none; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .card { padding: 30px 10px; background: white; border: 2px solid #e0e7ff; cursor: pointer; border-radius: 12px; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; padding: 20px; overflow-y: auto; }
        .form-box { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: right; }
        li { margin: 8px 0; padding: 8px; border-bottom: 1px solid #eee; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-bar">
    <select class="lang-select" onchange="changeLanguage(this.value)">
        <option value="ar">العربية</option>
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
        <option value="ru">Русский</option>
        <option value="zh">中文</option>
    </select>
</div>

<div class="grid">
    <div class="card" onclick="openModal('Digital')">نورمال ديجيتال</div>
    <div class="card" onclick="openModal('Studio')">نورمال ستوديو</div>
    <div class="card" onclick="openModal('Art')">نورمال آرت</div>
    <div class="card" onclick="openModal('Print')">نورمال برينت</div>
</div>

<div id="modal" class="modal">
    <div class="form-box">
        <button onclick="document.getElementById('modal').style.display='none'" style="background:red; color:white; border:none; padding:10px;">إغلاق ✖</button>
        <h3 id="modalTitle"></h3>
        <ul id="subList"></ul>
    </div>
</div>

<script>
    const translations = {
        ar: { title: "نورمال ديجيتال", items: ['تصميم المواقع', 'تطوير المتاجر', 'تطبيقات الجوال', 'برمجة خاصة', 'أنظمة إدارة', 'ذكاء اصطناعي', 'أتمتة المهام', 'واجهات مستخدم', 'محركات بحث', 'استضافة', 'أمن سيبراني', 'دعم فني', 'ربط منصات', 'لوحات تحكم', 'صفحات تعريفية'] },
        en: { title: "Normal Digital", items: ['Web Design', 'E-commerce', 'Mobile Apps', 'Custom Coding', 'Business Systems', 'AI Solutions', 'Automation', 'UI/UX Design', 'SEO', 'Hosting', 'Cyber Security', 'Tech Support', 'API Integration', 'Dashboards', 'Landing Pages'] },
        fr: { title: "Normal Digital", items: ['Design Web', 'E-commerce', 'App Mobile', 'Codage', 'Gestion', 'IA', 'Automatisation', 'UI/UX', 'SEO', 'Hébergement', 'Sécurité', 'Support', 'Intégration', 'Tableaux', 'Landing Pages'] },
        es: { title: "Normal Digital", items: ['Diseño Web', 'E-commerce', 'Apps', 'Programación', 'Sistemas', 'IA', 'Automatización', 'UI/UX', 'SEO', 'Hosting', 'Seguridad', 'Soporte', 'Integración', 'Dashboards', 'Landing Pages'] },
        de: { title: "Normal Digital", items: ['Webdesign', 'E-commerce', 'Apps', 'Programmierung', 'Systeme', 'KI', 'Automatisierung', 'UI/UX', 'SEO', 'Hosting', 'Sicherheit', 'Support', 'Integration', 'Dashboards', 'Landing Pages'] },
        ru: { title: "Normal Digital", items: ['Веб-дизайн', 'E-commerce', 'Приложения', 'Программирование', 'Системы', 'ИИ', 'Автоматизация', 'UI/UX', 'SEO', 'Хостинг', 'Безопасность', 'Поддержка', 'Интеграция', 'Панели', 'Лендинги'] },
        zh: { title: "Normal Digital", items: ['网页设计', '电子商务', '移动应用', '定制开发', '管理系统', '人工智能', '自动化', 'UI/UX', 'SEO', '主机服务', '网络安全', '技术支持', '系统集成', '仪表盘', '落地页'] }
    };

    let currentCat = "Digital";
    let currentLang = "ar";

    function changeLanguage(lang) {
        currentLang = lang;
        document.documentElement.lang = lang;
        document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        if (document.getElementById('modal').style.display === 'block') openModal(currentCat);
    }

    function openModal(cat) {
        currentCat = cat;
        // هنا يمكنك إضافة منطق لجلب العناوين والقوائم لكل قسم
        const langData = translations[currentLang];
        document.getElementById('modalTitle').innerText = langData.title;
        document.getElementById('subList').innerHTML = langData.items.map(item => `<li>✅ ${item}</li>`).join('');
        document.getElementById('modal').style.display = 'block';
    }
</script>
</body>
</html>
