<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0d0717; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .logo { width: 140px; filter: brightness(0) invert(1); margin: 40px 0 20px; }
        .hero { font-size: 15px; margin-bottom: 40px; color: #ccc; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 0 auto; }
        
        /* لمسة الإضاءة على المربعات */
        .card { padding: 25px 15px; border: 1px solid #333; border-radius: 12px; background: rgba(255,255,255,0.03); transition: 0.4s; cursor: pointer; }
        .card:hover { border-color: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        
        .assistant-box { border: 1px solid #4a356a; border-radius: 15px; padding: 25px; max-width: 500px; margin: 40px auto; background: rgba(169, 85, 247, 0.05); }
        input { width: 85%; padding: 12px; border-radius: 8px; border: 1px solid #4a356a; background: #0d0717; color: white; margin-bottom: 15px; }
        button { background: #a855f7; color: white; border: none; padding: 10px 30px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 10px #a855f7; }
        
        /* لمسة الإضاءة على الكلمات في الأسفل */
        .footer { margin-top: 50px; color: #666; font-size: 13px; line-height: 2; transition: 0.3s; }
        .footer:hover { color: #a855f7; text-shadow: 0 0 8px #a855f7; cursor: pointer; }
    </style>
</head>
<body>

    <img src="logo.png.PNG" class="logo">
    <div class="hero">إبداع بلا حدود | نُحوّل أفكارك إلى تجارب استثنائية</div>

    <h2 style="font-size: 20px; margin-bottom: 20px;">خدماتنا</h2>
    <div class="grid">
        <div class="card">تصوير المنتجات</div>
        <div class="card">التصميم الداخلي</div>
        <div class="card">إدارة السوشيال ميديا</div>
        <div class="card">الهوية البصرية</div>
    </div>

    <div class="assistant-box">
        <h3>المساعد الذكي "نورمال"</h3>
        <p style="font-size: 14px;">مرحباً بك! أنا مساعد نورمال، كيف يمكنني مساعدتك اليوم؟</p>
        <input type="text" placeholder="اكتب رسالتك هنا...">
        <br>
        <button>إرسال</button>
    </div>

    <div class="footer">
        الرئيسية | خدماتنا | تواصل معنا<br>
        الرئيسية | خدماتنا | المساعد الذكي
    </div>

</body>
</html>
